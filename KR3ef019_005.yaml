body:
  text: 卷五少陽篇辨列少陽條例大意少陽居表裡之間當肓膜之處外不及於皮膚內不及於臟腑汗之而不從表出下之而不從里出故有汗吐下之戒而惟小柴胡一方和解表裡為少陽正治之法凡十六條其次則有和解而兼汗下之法謂證兼太陽之表則宜兼汗或證兼陽明之裡則宜兼下如柴胡加桂枝湯柴胡加芒硝湯大柴胡湯柴胡桂枝湯等方是也夫有汗下之禁而或汗之或下之此亦少陽權變法也凡四條又其次為刺法如縱橫脅滿合併之病當刺期門大椎肺俞肝俞諸穴是也凡四條少陽正治法第一少陽證一條少陽之為病口苦咽乾目眩也足少陽膽也膽盛精汁三合而其味苦膽受邪而熱其氣上溢故口苦咽門者肝膽之候目鋭眥者膽脈之所起故咽乾目眩也小柴胡湯證九條傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之傷寒五六日中風者言或傷寒五六日傳至少陽或少陽本經自中風邪非既傷寒五六日而又中於風也往來寒熱者少陽居表裡之間進而就陰則寒退而從陽則熱也胸脅苦滿者少陽之脈其直者從缺盆下腋循胸過季脅故也默默不欲飲食心煩喜嘔者木火相通而膽喜犯胃也或者未定之辭以少陽為半表半裡其氣有乍進乍退之機故其病有或然或不然之異而少陽之病但見有往來寒熱胸脅苦滿之證便當以小柴胡和解表裡為主所謂傷寒中風有柴胡證但見一證便是不必悉具是也此條自太陽篇移入小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩生薑三兩半夏半升洗大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚胸中煩而不嘔者邪聚於膈而不上逆也熱聚則不得以甘補不逆則不必以辛散故去人參半夏而加栝蔞實之寒以除熱而蕩實也若渴者去半夏加人參合前成四兩半栝蔞根四兩渴者木火內煩而津虛氣燥也故去半夏之溫燥而加人參之甘潤栝蔞根之涼苦以徹熱而生津也若腹中痛者去黃芩加芍藥三兩腹中痛者木邪傷土也黃芩苦寒不利脾陽芍藥酸寒能於土中瀉木去邪氣止腹痛也若脅下痞硬去大棗加牡蠣四兩脅下痞硬者邪聚少陽之募大棗甘能增滿牡蠣咸能軟堅好古云牡蠣以柴胡引之能去脅下痞也若心下悸小便不利者去黃芩加茯苓四兩心下悸小便不利者水飲蓄而不行也水飲得冷則停得淡則利故去黃芩加茯苓若不渴外有微熱者去人參加桂三兩溫覆取微汗愈不渴外有微熱者里和而表未解也故不取人參之補里而用桂枝之解外也若咳者去人參大棗生薑加五味子半升乾薑二兩咳者肺寒而氣逆也經曰肺苦氣上逆急食酸以收之又曰形寒飲冷則傷肺故加五味之酸以收逆氣乾薑之溫以卻肺寒參棗甘壅不利於逆生薑之辛亦惡其散耳血弱氣盡腠理開邪氣因入與正氣相摶結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之服柴胡湯已渴者屬陽明也以法治之血弱氣盡腠理開謂亡血新産勞力之人氣血不足腠理疏豁而邪氣乘之也邪入必與正相摶而結於脅下脅下者少陰之募而少陰者陰陽之交也邪氣居之陰出而與邪爭則寒陽入而與邪爭則熱陰陽出入各有其時故寒熱往來休作有時也默默不欲飲食義如上條臟腑相連四句是原所以邪氣入結之故謂膽寄於肝地逼氣通是以其邪必從腑而入臟所謂其痛必下也邪高謂病所來處痛下謂病所結處邪欲入而正拒之則必上逆而嘔也至其治法亦不出小柴胡和解表裡之法服後邪解氣和口必不渴若渴者是少陽邪氣復還陽明也以法治之者謂當從陽明之法而不可復從少陽之法矣此亦從太陽篇移入傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之此條類似太陽與少陽並病以太陽不得有脅下滿少陽不得有頸項強且手足溫而渴知其邪不獨在表而亦在裡也欲合表裡而並解則非小柴胡不可耳亦太陽篇移入傷寒中風有柴胡證但見一證便是不必悉具柴胡證如前條所謂往來寒熱胸脅苦滿等證是也傷寒中風者謂無論傷寒中風有柴胡證者但見一證便當以小柴胡和解之不可謂其不具而以他藥發之也前條云身熱惡風頸項強脅下滿者與小柴胡不與桂枝即此意亦太陽篇移入凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解柴胡證不應下而反下之於法為逆若柴胡證不罷者仍宜柴胡湯和解所謂此雖已下不為逆也蒸蒸而振者氣從內達邪從外出有戰勝之義焉是以發熱汗出而解也亦太陽篇移入傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不瘥者與小柴胡湯主之陽脈澀陽氣少也陰脈弦陰有邪也陽不足而陰乘之法當腹中急痛故以小建中湯溫里益虛散陰氣若不瘥知非虛寒在裡而是風邪內干也故當以小柴胡湯散邪氣止腹痛亦太陽篇移入傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解頭汗出微惡寒為表證手足冷心下滿口不欲食大便硬脈細為里證陽微結者陽邪微結未純在裡亦不純在表故曰必有表復有里也傷寒陰邪中於陰者脈沉陽邪結於裡者脈亦沉合之於證無外證者為純在裡有外證者為半在表也無陽證者沉為在陰有陽證者沉為在裡也夫頭為陽之會而陰不得有汗今脈沉緊而頭汗出知其病不在少陰亦並不純在表故可與小柴胡湯合外內而並治之耳設不了了者必表解而里未和也故曰得屎而解本太陽病不解轉入少陽者脅下硬痛乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之本太陽脈浮頭痛惡寒之證而轉為脅下硬滿乾嘔不能食往來寒熱者太陽不解而傳入少陽也尚未吐下不經藥壞者脈雖沉緊可與小柴胡以和之以證見少陽舍脈而從證也或云脈沉緊連上未吐下看言尚未經吐下與脈未至沉緊者知其邪猶在經可與小柴胡以和之或云沉當作浮前陽明篇第四十七條云病過十日脈續浮者與小柴胡湯是也並通若已吐下發汗溫針疊傷津液胃燥譫語而脅下硬滿乾嘔等證反罷者此衆法盡投正已大傷而邪猶不解謂之壞病非小柴胡所得而治者須審其因犯何逆隨證以法治之少陽汗吐下之禁二條傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸經曰少陽之至其脈弦故頭痛發熱者三陽表證所同而脈弦細則少陽所獨也少陽經兼半里熱氣已動是以不可發汗發汗則津液外亡胃中乾燥必發譫語云此屬胃者謂少陽邪氣並於陽明胃府也若邪去而胃和則愈設不和則木中之火又將併入心臟而為煩為悸矣少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚此少陽自中風邪之證不從太陽傳來者也少陽之脈起於目鋭眥其支從耳後入耳中以下胸中少陽受邪壅熱於經故耳聾目赤胸中滿而煩也是不在表故不可吐復不在裡故不可下吐則傷陽陽虛而氣弱則悸下則傷陰陰虛而火動則驚辨少陽邪氣進退之機四條傷寒六七日無大熱其人躁煩者此為陽去入陰故也邪氣在表則發熱入里則躁煩傷寒六七日外無大熱而其人躁煩者邪氣去陽而之陰也去又訓作往言陽邪往入陰中也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此謂三陰不受邪也傷寒一日太陽二日陽明三日少陽四日當傳太陰內經傷寒傳變之常法然也陽邪傳陰則當嘔而不能食若其人反能食不嘔則邪氣不傳於陰將從陽而解也傷寒三日少陽脈小者欲已也傷寒三日少陽受邪而其脈反小者邪氣已衰其病欲解而愈經云大則病進小則病退此之謂也少陽病欲解時從寅至辰上少陽膽木也從寅至辰為木旺之時故其病欲解必於是三時亦猶太陽之解於巳午未陽明之解於申酉戌也少陽權變法第二柴胡桂枝湯證一條傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之發熱微惡寒肢節煩疼邪在肌表所謂外證未去也傷寒邪欲入里而正不容則嘔微嘔者邪入未多也支結者偏結一處不正中也與心下硬滿不同此雖表解猶不可攻況外證未去者耶故以柴胡桂枝合劑外解表邪內除支結乃七表三里之法也柴胡桂枝湯方柴胡半兩桂枝半兩甘草一兩炙黃芩半兩人參半兩半夏二合半白芍半兩生薑一兩半大棗六枚擘上九味以水七升煮取三升去滓溫服柴胡桂枝幹薑湯證一條傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之王叔和本在太陽篇中今移置此汗下之後胸脅滿微結者邪聚於上也小便不利渴而不嘔者熱勝於內也傷寒汗出周身漐漐人靜不煩者為已解但頭汗出而身無汗往來寒熱心煩者為未欲解夫邪聚於上熱勝於內而表復不解是必合表裡以為治柴胡桂枝以解在外之邪乾薑牡蠣以散胸中之結栝蔞根黃芩除心煩而解熱渴炙甘草佐柴胡桂枝以發散合芩栝蔞薑蠣以和里為三表七里之法也柴胡桂枝幹薑湯方柴胡半斤桂枝三兩乾薑二兩黃芩三兩栝蔞根四兩牡蠣三兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出愈柴胡加芒硝湯證一條傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯以治其里也此少陽經邪兼陽明內實之證少陽病在經故胸脅滿而嘔所謂柴胡證也下之而三字疑衍凡柴胡證不得利今反利者知醫以丸藥下之為醫之誤非病之情也潮熱者陽明之實也實則可下而證兼少陽則不可下故先宜小柴胡以解其外後以柴胡加芒硝湯以治其里亦如下條之先與小柴胡後與大柴胡之例也亦太陽篇移入尚從善云此本柴胡證下之而不得利仲景謂此本柴胡證醫設以大柴胡湯下之則表裡俱解何至有下利之證云柴胡加芒硝湯方於小柴胡湯內加芒硝六兩余依前法服不解更服大柴胡湯證一條太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈太陽病過經十餘日而有柴胡證乃邪氣去太陽之陽明而復之少陽也少陽不可下而反二三下之於法為逆若後四五日柴胡證仍在者先與小柴胡湯所謂柴胡湯病證而下之若柴胡證不罷者復與柴胡是也若服湯已嘔不止心下急鬱郁微煩者邪氣鬱滯於裡欲出不出欲結不結為未解也與大柴胡以下里熱則愈亦先表后里之意也此條自太陽篇移入大柴胡湯方柴胡八兩半夏八兩黃芩三兩生薑五兩枳實四枚芍藥三兩大棗十二枚擘大黃二兩酒浸上八味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服按大柴胡有柴胡生薑半夏之辛而走表黃芩芍藥枳實大黃之苦而入里乃表裡並治之劑而此云大柴胡下之者謂病兼表裡故先與小柴胡解之而後以大柴胡下之耳蓋分言之則大小柴胡各有表裡合言之則小柴胡主表而大柴胡主裡古人之言當以意逆往往如此少陽刺法第三刺法四條傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門腹滿譫語里之實也其脈當沉實而反浮緊則非裡實乃肝邪乘脾氣窒而熱也縱直也以肝木製脾土於理為直故曰縱發熱惡寒表有邪也其病不當有渴而反大渴則非內熱乃肝邪乘肺氣鬱而燥也以里無熱不能消水故腹滿而汗出小便利則肺氣以行故愈橫不直也以木畏金而反乘金於理為曲故曰橫二者俱瀉肝邪則愈故刺期門期門肝之募也設不知而攻其實熱則誤矣此病機之變不可不審也太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一節肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之太陽之脈其直者從巔入絡腦還出別下項少陽之脈起目鋭眥上抵頭角其內行者由缺盆下胸中貫膈絡肝屬膽故頭項強痛者太陽之邪未罷或眩冒時如結胸心下痞硬者少陽之邪方盛也大椎在脊骨第一節上刺之所以瀉太陽邪氣而除頸項之強痛肺俞在脊骨第三節下兩旁肝俞在第九節下兩旁刺之所以瀉少陽邪氣而除眩冒時如結胸及心下之痞硬慎不可發汗以亡胃液液亡胃燥必發譫語且恐少陽之邪得乘虛而干胃也若脈弦至五六日譫語不止是少陽勝而陽明負亦如陽明與少陽合病之為失也故當刺期門以瀉少陽之邪亦慎勿下之以虛其胃胃虛邪陷必作結胸如本論云太陽少陽並病而反下之成結胸也
