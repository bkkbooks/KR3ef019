body:
  text: 卷八厥陰篇辨列厥陰條例大意厥陰為陰之盡為臟之極陰極而盡則必復反而之陽故厥陰之生死在厥熱之進退也本篇於厥陰脈證之下先辨厥熱進退所以明生死之機次論生死微甚所以明陰陽之故也而厥陰有熱慮其傷陰必以法清之厥陰有寒慮其傷陽必以法溫之一如少陰之例也蓋厥陰少陰同為陰臟而俱屬陽火故於二者群分類聚欲學者明辨而深思之耳其次為厥陰汗下諸禁蓋欲蒙其利不可不知其害也其次為厥陰簡誤以厥陰篇中雜入太陰少陰太陽之文傳誤已久習焉不察特檢出之其次為瘥後勞復等法則去疾者莫若盡之意也凡六十二條為一卷厥陰諸法厥陰病脈證五條厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食則吐蛔下之利不止傷寒之病邪愈深者其熱愈甚厥陰為陰之盡而風木之氣又足以生陽火而鑠陰津津虛火實臟燥無液求救於水則為消渴消渴者水入不足以制熱而反為熱所消也氣上衝心心中疼熱者火生於木肝氣通心也飢而不欲食者木喜攻土胃虛求食而邪熱復不能消穀也食入即吐蛔者蛔無食而動聞食臭而出也下之利不止者胃家重傷而邪熱下注也此厥陰在臟之的證病從陽經傳入者也傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也傷寒四五日正邪氣傳裡之時若腹中痛而滿者熱聚而實將成可下之證茲腹中痛而不滿但時時轉氣下趨少腹者熱不得聚而從下注將成下利之候也而下利有陰陽之分先發熱而後下利者傳經之熱邪內陷此為熱利必有內煩脈數等證不發熱而下利者直中之陰邪下注此為寒利必有厥冷脈微等證要在審問明白也下利寸脈反浮數尺中自澀者必圊膿血此陽邪入里而作下利之證寸浮數者陽邪強也尺中澀者陰氣弱也以強陽而加弱陰必圊膿血下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利清穀脈沉而遲陰在裡在下也面少赤身有微熱陽在上在外也夫陰內陽外而為病者必得陽入陰出而後解而面雖赤而未甚身雖熱而亦微則其陽之發露者僅十之三而潛藏者尚十之七也藏而能動必當與陰相爭爭而未勝則鬱冒爭而既勝則汗出汗出而內伏之陰從外出外出之陽從內入而病乃解矣然此證下虛無氣中土不守惟藉君主之靈以收散亡之氣而驅沉伏之陰鬱冒汗出則心君震怒之候病人所以必微厥也設非下虛之故何至危殆若是然或真陽畢露則必不能與邪爭不爭亦必無幸矣病者手足厥冷不結胸少腹滿按之痛者此冷結在膀胱關元也手足厥冷原有陰陽虛實之別若其人結胸則邪結於上而陽不得通如後所云病人手足厥冷脈乍緊邪結在胸中當須吐之以通其陽者也若不結胸但少腹滿按之痛者則是陰冷內結元陽不振病在膀胱關元之間必以甘辛溫藥如四逆白通之屬以救陽氣而驅陰邪也厥陰進退之機九條傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤傷寒一二日至四五日正陰陽邪正交爭互勝之時或陰受病而厥者勢必轉而為熱陰勝而陽爭之也或陽受病而熱者甚則亦變而為厥陽勝而陰被格也夫陽勝而陰格者其厥非真寒也陽陷於中而陰見於外也是以熱深者厥亦深熱微者厥亦微隨熱之淺深而為厥之微甚也夫病在陽者宜汗病在裡者宜下厥者熱深在裡法當下之而反發汗則必口傷爛赤蓋以蘊隆之熱而被升浮之氣不從下出而從上逆故耳傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈傷寒厥五日熱亦五日者陰勝而陽復之也至六日陰當復勝而厥設不厥則陰退而邪解矣故自愈夫厥與熱陰陽消長之兆也茲初病至終其厥不過五日而厥已而熱亦得五日是其復之之數當其勝之之數所謂有陽則復無太過亦無不及故知其病自愈也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血傷寒厥四日熱反三日厥復五日其病為進寒多熱少陽氣退故為進也熱已而厥者邪氣自表而之裡也乃厥未已而熱之日又多於厥之日則邪復轉而之表矣故病當愈其熱則除乃四日至七日而不除者其熱必侵及營中而便膿血所謂熱氣有餘必發癰膿也厥已而熱者陽氣復而陰邪退也乃熱未已而復厥而厥又多於熱之日則其病為進所以然者寒多熱少陽氣不振則陰邪復勝也要之熱已而厥者傳經之證慮其陽邪遞深也厥已而熱者直中之證慮其陽氣不振也故傳經之厥熱以邪氣之出入言直中之厥熱以陰陽之勝復言病證則同而其故有不同如此學者能辨乎此則庶幾矣傷寒先厥後發熱而利者必自止見厥復利傷寒先厥者陰先受邪也後熱者邪從陰而出陽也陰受邪而利及邪出而之陽故利必自止設復厥則邪還入而之陰故必復利蓋邪氣在陽則生熱在陰則為厥與利自然之道也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期至旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期至旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也傷寒始發熱六日厥反九日而又下利者邪氣從陽之陰而盛於陰也陰盛則當不能食而反能食者恐為除中中者胃中之陽氣也除者去而盡之也言胃氣為邪氣所迫盡情發露不留余蘊也不發熱不字當作若謂試以索餅食之若果胃氣無餘必不能蒸郁成熱今反熱者知胃氣尚在非除中之謂矣而又恐暴熱暫來而復去仍是胃陽發露之凶徵也後三日脈之而其熱仍在則其能食者乃為胃陽復振無疑故期至旦日夜半其病當愈所以然者本發熱六日厥反九日熱少厥多其病當進茲復發熱三日並前六日亦為九日適與厥日相應故知其旦日夜半其病當愈旦日猶明日也然厥與熱者陰陽勝負之機不可偏也偏於厥則陰勝而礙陽矣偏於熱則陽勝而礙陰矣後三日脈之而脈反加數熱復不止則陽氣偏勝必致傷及營血而發為癰膿也傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹傷寒之邪見於陽者不必見於陰見於下者不必見於上厥已而熱下利自止者陰邪轉而之陽也設得汗出其邪必解而咽中痛者未盡之熱厥而上行也故其喉為痹發熱無汗者邪氣鬱而在陽也雖下利法當自止而反不止者以無汗出熱仍從里行也故必便膿血便膿血者其喉不痹邪在下者則不復在上也傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血熱少厥微指頭寒邪氣自微也默默不欲食煩躁邪欲傳裡也里受邪而熱則其小便必不利雖利其色必不白至數日小便利色白知其熱已除也本默默不欲食忽欲得食知其胃已和也熱除胃和其病則愈而厥陰之脈挾胃上膈布脅肋若其邪不解淫溢厥陰之位則為厥而嘔為胸脅煩滿也凡病上行極者必下行主血而病為熱血為熱迫注泄於下則其後必便血也凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也按經脈足之三陰三陽相接於足十趾手之三陰三陽相接於手十指故陰之與陽常相順接者也若陽邪內入陰不能與之相接而反出於外則厥陰邪外盛陽不能與之相接而反伏於中亦厥是二者雖有陰陽之分其為手足逆冷一也厥陰生死微甚之辨十五條厥陰中風脈微浮為欲愈不浮為未愈此厥陰經自受風邪之證脈微為邪氣少浮為病在經經病而邪少故為欲愈或始先脈不微浮繼乃轉而為浮者為自陰之陽之候亦為欲愈所謂陰病得陽脈者生是也然必兼有發熱微汗等候仲景不言者以脈該證也若不浮則邪著陰中漫無出路其愈正未可期故曰不浮為未愈傷寒下利日十餘行脈反實者死傷寒下利至日十餘行邪既未盡而正已大憊矣其脈當微或弱而反實者是邪氣有餘所謂病勝臟也故死下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死沉為里為下弦為陰下利脈沉弦者陰邪在裡而盛於下故下重也脈大者邪氣盛經曰大則病進故為未止脈微弱為邪氣微數為陽氣復陰寒下利陽復而邪微則為欲愈之候雖復發熱亦是陽氣內充所致不得比於下利發熱者死之例也下利有微熱而渴脈弱者令自愈下利脈數有微熱汗出令自愈設復緊為未解此二條亦為陰邪下注者設微熱而渴與脈數有微熱汗出並陽氣內充之象而脈弱又陰氣衰退之徵故令自愈夫脈弱者脈緊去而轉弱也設復緊則陰邪仍盛其病豈能遽已耶下利脈數而渴者令自愈設不瘥必圊膿血以有熱故也此亦陰邪下利而陽氣已復之證脈數而渴與下利有微熱而渴同意然脈不弱而數則陽之復者已過陰寒雖解熱氣旋增將更傷陰而圊膿血也發熱而厥七日下利者為難治發熱而厥者身發熱而手足厥病屬陽而里適虛也至七日正漸復而邪欲退則當厥先已而熱後除乃厥熱如故而反加下利是正不復而里益虛矣夫病非陰寒則不可以辛甘溫其里而內虛不足復不可以苦寒堅其下此其所以為難治也傷寒發熱下利厥逆躁不得臥者死傷寒發熱下利厥逆者邪氣從外之內而盛於內也至躁不得臥則陽氣有立亡之象故死此傳經之邪陰氣先竭而陽氣後絶者也傷寒發熱下利至甚厥不止者死發熱下利厥逆證與上同而下利至甚則陰欲亡厥逆不止則陽亦傷雖不躁猶死也此亦傳經之邪陰先竭而陽後絶者也傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也寒傷於陰至六七日發熱者陽復而陰解雖下利猶當自止所謂傷寒先厥後發熱而利者必自止也乃傷寒六七日本不下利而忽熱與利俱見此非陽復而熱也陰內盛而陽外亡也若其人汗出不止則不特不能內守亦並無為外護矣是謂有陰無陽其死必矣下利手足厥冷無脈者灸之不溫若脈不還反微喘者死陰寒下利而至厥冷無脈陽氣將竭而死矣灸之所以通既絶之陽乃厥不回脈不還而反微喘殘陽上奔大氣下脫故死下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死晬時周時也下利後脈絶手足厥冷者陰先竭而陽後絶也是當俟其晬時經氣一周其脈當還其手足當溫若脈不還其手足亦必不溫而死矣傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死傷寒六七日陽氣當復陰邪當解之時乃脈不浮而微手足不煩而厥冷是陰氣反進而陽氣反退也煩躁者陽與陰爭而陽不能勝之也灸厥陰所以散陰邪而復陽氣陽復則厥自還設不還則陽有絶而死耳是故傳經之邪至厥陰者陰氣不絶則不死直中之邪入厥陰者陽氣不復則不生也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死脈數為熱脈遲為寒診家之大要也熱者清之寒者溫之醫家之大法也乃傷寒脈遲至六七日而不變其為寒無疑矣而反與黃芩湯復除其熱是以寒益寒也於是陽氣消亡陰寒獨勝法當腹中冷而不能食今反能食者非胃氣盛也胃中之陽發露無餘譬之貧兒誇富罄諸所有而暴之於外雖炫耀目前然其儘可立而待也故直斷之曰此名除中必死厥陰病欲解時從寅至卯上厥陰屬風木之臟寅卯為木王之時臟氣勝而邪氣解亦如三陽及太少二陰之例也厥陰清法五條厥陰病渴欲飲水者少少與之愈厥陰之病本自消渴雖得水未必即愈此云渴欲飲水少少與之愈者必厥陰熱邪還返陽明之候也熱還陽明津液暴竭求救於水少少與之胃氣則和其病乃愈若系厥陰則熱足以消水而水豈能消其熱哉下利欲飲水者以有熱故也白頭翁湯主之傷寒自利不渴者為臟有寒太陰自受寒邪也下利欲飲水者以里有熱傳經之邪厥陰受之也白頭翁湯除熱堅下中有秦皮色青味苦氣涼性澀能入厥陰清熱去濕而止利也白頭翁湯方白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升熱利下重者白頭翁湯主之傷寒熱邪入里因而作利者謂熱利下重即後重熱邪下注雖利而不得出也白頭翁苦辛除邪氣黃連黃柏秦皮苦以堅之寒以清之澀以收之也下利後更煩按之心下濡者為虛煩也宜梔子豉湯下利後更煩者熱邪不從下減而復上動也按之心下濡則中無阻滯可知故曰虛煩香豉梔子能徹熱而除煩得吐則熱從上出而愈因其高而越之之意也傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利吐膿血泄利不止者為難治麻黃升麻湯主之傷寒六七日寒已變熱而未實也乃大下之陰氣遂虛陽氣乃陷陽氣陷故寸脈沉而遲陰氣虛故下部脈不至陰陽並傷不相順接則手足厥逆而陽邪之內入者方上淫而下溢為咽喉不利為吐膿血為泄利不止是陰陽上下並受其病而虛實冷熱亦復混淆不清矣是以欲治其陰必傷其陽欲補其虛必礙其實故曰此為難治麻黃升麻湯合補瀉寒熱為劑使相助而不相悖庶幾各行其事而並呈其效方用麻黃升麻所以引陽氣發陽邪也而得當歸知母葳蕤天冬之潤則肺氣已滋而不蒙其發越之害矣桂枝乾薑所以通脈止厥也而得黃芩石膏之寒則中氣已和而不被其燥熱之烈矣其芍藥甘草茯苓白朮則不特止其泄利抑以安中益氣以為通上下和陰陽之用耳麻黃升麻湯方麻黃二兩半去節當歸升麻各一兩一分知母黃芩葳蕤各十八銖石膏綿裹碎白朮乾薑白芍天冬去心桂枝茯苓甘草炙各六銖上十四味以水一斗先煮麻黃一二沸去上沫納諸藥煮取三升去滓分溫三服相去如炊三斗米飯頃令盡汗出愈厥陰溫法十條傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久痢傷寒脈微而厥寒邪中於陰也至七八日身不熱而膚冷則其寒邪未變可知乃其人躁無暫安時者此為臟厥發躁陽氣欲絶非為蛔厥也蛔厥者蛔動而厥其人亦躁但蛔靜則躁亦自止蛔動則時復自煩非若臟寒之躁無有暫安時也然蛔之所以時動而時靜者何也蛔性喜溫臟寒則蛔不安而上膈蛔喜得食臟虛則蛔復上而求食甚則嘔吐涎液從口中出按古云蛔得甘則動得苦則安又曰蛔聞酸則靜得辛熱則止故以烏梅之酸連柏之苦薑辛歸附椒桂之辛以安蛔溫臟而止其厥逆加人參者以蛔動中虛故以之安中而止吐且以御冷熱諸藥之悍耳烏梅丸方烏梅三百個黃連一斤乾薑十兩細辛附子炮桂枝人參黃柏各六兩當歸蜀椒各四兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如桐子大先食飲服十丸日三服稍加至二十丸禁生冷滑物臭食等乾嘔吐涎沫頭痛者吳茱萸湯主之乾嘔吐涎沫者厥陰寒邪上攻陽明也頭痛者厥陰之脈上出額與督脈會於巔寒氣隨經上入於頭故痛也然頭者諸陽之會以陰邪而得干之其陽不振甚矣故以吳茱萸辛熱入厥陰散寒邪為君生薑辛溫和胃止嘔吐為臣人參大棗甘溫助正氣養陽氣為佐也手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之手足厥寒脈微欲絶者陽之虛也宜四逆輩脈細欲絶者血虛不能溫於四末並不能榮於脈中也夫脈為血之府而陽為陰之先故欲續其脈必益其血欲益其血必溫其經方用當歸芍藥之潤以滋之甘草大棗之甘以養之桂枝細辛之溫以行之而尤藉通草之入經通脈以續其絶而止其厥若其人內有久寒者必加吳茱萸生薑之辛以散之而尤藉清酒之濡經浹脈以散其久伏之寒也當歸四逆湯方當歸三兩桂枝三兩芍藥三兩細辛三兩通草二兩甘草二兩炙大棗二十五枚擘一法十二枚上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯方當歸三兩桂枝三兩芍藥三兩細辛三兩通草二兩甘草二兩炙大棗二十五枚吳茱萸二升生薑半斤切上九味以水六升清酒六升和煮取五升去滓溫分五服一方水酒各四升大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之此過汗傷陽病本熱而變為寒之證大汗出熱不去者邪氣不從汗解而陽氣反從汗亡也陽氣外亡則寒冷內生內冷則脈拘急而不舒也四肢者諸陽之本陽虛不足不能實氣於四肢則為之疼痛也甚至下利厥逆而惡寒則不特無以內守亦並不為外護矣故必以四逆湯救陽驅陰為主余謂傳經之熱久亦成陰者此類是也大汗若大下利而厥逆者四逆湯主之此亦陽病誤治而變陰寒之證成氏所謂大汗若大下利表裡雖殊其亡津液損陽氣一也陽虛陰勝則生厥逆雖無裡急下利等證亦必以救陽驅陰為急易曰履霜堅冰至陰盛之戒不可不凜也傷寒脈促手足厥逆者可灸之脈陽盛則促陰盛則結手足厥逆而脈促者非陽之虛乃陽之鬱而不通也灸之所以引陽外出若厥而脈微者則必更以四逆湯溫之豈特灸之哉嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之脈弱便利而厥為內虛且寒之候則嘔非火邪乃是陰氣之上逆熱非寒邪乃是陽氣之外越矣故以四逆湯救陽驅陰為主然陰方上衝而陽且外越其離決之勢有未可即為順接者故曰難治或曰嘔與身熱為邪實厥利脈弱為正虛虛實互見故曰難治四逆湯舍其標而治其本也亦通下利清穀裡寒外熱汗出而厥者通脈四逆湯主之挾熱下利者傷在太陰之陰中寒清穀者傷在少陰之陽裡寒外熱汗出而厥為陰內盛而陽外越之象故於四逆加乾薑一倍以溫里而勝寒邪曰通脈者蓋欲使陽氣內行而厥與利俱止耳傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也傷寒寒勝則厥心下有水則悸厥而心下悸者寒中於陰而水聚於心下也是宜以茯苓甘草湯先治其水水去然後治厥如傷寒二三日心中悸而煩者先服建中湯之意也建中者建立中氣恐其中虛而邪易入邪入則煩不止矣茯苓甘草湯甘淡利水益中氣恐其水漬入胃而作利利作則厥不回矣仲景治病每以正氣為慮如此傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之傷寒本自寒下蓋即太陰腹滿自利之證醫不知而復吐下之裡氣遂虛陰寒益甚胃中之陽被格而上逆脾中之陰被抑而下注得不倍增吐下乎至食入口即吐則逆之甚矣若以寒治逆則寒下轉增或僅投溫劑則必格拒而不入故以連芩之苦以通寒格參薑之溫以復正氣而逐陰邪也乾薑黃連黃芩人參湯方乾薑三兩黃連三兩黃芩三兩人參三兩上四味以水六升煮取二升去滓分溫再服厥陰病禁二條傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒五六日邪氣傳裡在上則為結胸在下則為腹滿而實若不結胸腹濡而脈復虛則表裡上下都無結聚其邪為已解矣解則其人不當復厥而反厥者非陽熱深入也乃血不足而不榮於四末也是宜補而不可下下之是虛其虛也玉函云虛者重瀉其氣乃絶故死諸四逆厥者不可下之虛家亦然按成氏曰四逆四肢不溫也厥者手足冷也然本篇云厥者手足逆冷是也又云傷寒脈促手足厥逆者可灸之其他凡言厥逆之處不一則四逆與厥本無分別特其病有陰陽之異耳此條蓋言陰寒厥逆法當溫散溫養之故云不可下之前條云厥應下之者則言邪熱內陷之厥逆也學者辨之虛家體虛不足之人也雖非四逆與厥亦不可下之經云毋實實毋虛虛而遺人夭殃此之謂也簡誤九條嘔家有癰膿者不可治嘔膿儘自愈癰膿者傷寒熱聚於胃口而不行則生腫癰而膿從嘔出癰不已則嘔不止是因癰膿而嘔故不可概以止嘔之藥治之膿盡癰已則嘔自止此胃癰雜病當隸陽明不當入厥陰也以下九條均非厥陰本病叔和不察誤編厥陰篇中茲特檢出另列簡誤其他厥陰進退及下利嘔逆等證亦有不必定屬厥陰者叔和以為不便清晰故總隸厥陰而實為三陰並有之證茲仍其舊學者當以意會之傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也傷寒大吐大下之既損其上復傷其下為極虛矣縱有外氣怫鬱不解亦必先固其里而後疏其表乃復飲水以發其汗遂極汗出胃氣重虛水冷復加冷虛相搏則必作噦噦厄逆也此陽病誤治而變為寒冷者非厥陰本病也病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當吐之宜瓜蒂散脈緊為實乍緊者胸中之邪能結而不能實也夫胸中陽也陽實氣於四肢邪結胸中其陽不布則手足無氣而厥冷也而胃居心下心處胸間為煩滿為飢而不能食皆邪結胸中逼處不安之故經云其高者引而越之胸邪最高故當吐之瓜蒂苦而能湧能吐胸中結伏之邪也此證不必定屬陰經即陽病亦有之也傷寒噦而腹滿視其前後知何部不利利之愈噦而腹滿者病在下而氣溢於上也與病人欲吐不可下之者不同彼為上行極而欲下此為下行極而復上也經曰在下者引而竭之故當視其前後二陰知何部不利而利之則病從下出而氣不上逆腹滿與噦俱去矣此熱入太陰而上攻陽明之證與厥陰無涉也嘔而發熱者小柴胡湯主之此邪在少陽之經非厥陰本病故以小柴胡湯和解少陽之邪邪解則嘔熱俱止或厥陰病而外連少陽者亦有之然亦必以小柴胡先解少陽為急所謂病自內之外而盛於外者先解其外而後治其內下利譫語者有燥屎也宜小承氣湯譫語者胃實之徵下利得此為有燥屎所謂利者不利是也與小承氣湯下其燥屎屎去臟通下利自止經云通因通用此之謂也金匱治下利按之心下堅者與大承氣湯與此同意所當互考此太陰轉入陽明之證與厥陰無涉也下利清穀不可攻表汗出必脹滿清與圊同即完穀也乃陽不運而谷不腐也是當溫養中土不可攻表出汗汗出則陽益虛陽虛則氣不化故必脹滿此寒中太陰之證非厥陰病也少陰負趺陽者為順也少陰腎脈也趺陽胃脈也下利為土負水勝之病少陰負趺陽者水負而土勝也故曰順此條當為太陰下利而設亦與厥陰無涉也傷寒脈滑而厥者里有熱也白虎湯主之傷寒脈微而厥陰邪所中寒在裡脈滑而厥陽邪所傷熱在裡陽熱在裡陰氣被格陽反在內陰反在外設身熱不除則其厥不已故主白虎湯以清裡而除熱也此陽明熱極發厥之證誤編入厥陰者也瘥後諸病七條傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之陰陽易者男子大病新瘥尚有餘熱婦人與之交而得病名曰陽易或婦人大病新瘥餘熱未盡男子與之交而得病者名曰陰易以陰陽相感精氣交通熱氣從之而傳易也其人身體重少氣者勞傷真氣而熱勝之也少腹裡急或引陰中拘攣及膝脛拘急者精虛熱入而脈道不通也熱上衝胸頭重不欲舉眼中生花則熱氣重蒸而且上淆清陽矣大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚大病新瘥血氣未復餘熱未盡而強力作勞因復發熱者名曰勞復為其餘熱之氣因勞而外浮也枳實梔子所以下熱豆豉所以散熱蓋亦表裡之劑而氣味輕薄適宜於病後復發之體耳若有宿食者名曰食復內經所謂食肉則復多食則遺也故於枳實梔子豉湯中少加大黃以逐其宿食枳實梔子豉湯方枳實三枚炙梔子十四枚擘豉一升綿裹上以清漿水七升空煮取四升納枳梔煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗傷寒瘥已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之傷寒瘥已後更發熱者不因作勞亦未過食而未盡之熱自從內而達於外也故與小柴胡湯因其勢而解之且人參甘棗可以益病後之虛黃芩半夏可以和未平之裡也脈浮者邪氣連表汗之使之外解脈沉實者邪氣居里下之使從里解亦因其勢而利導之耳大病瘥後從腰以下有水氣者牡蠣澤瀉散主之大病新瘥而腰以下腫滿者此必病中飲水過多熱邪雖解水氣不行浸漬於下而肌肉腫滿也是當以急逐水邪為法牡蠣澤瀉散咸降之力居多飲服方寸匕不用湯藥者急藥緩用且不使助水氣也若驟用補脾之法恐脾氣轉滯而水氣轉盛寧不泛濫為患耶牡蠣澤瀉散方牡蠣熬澤瀉栝蔞根葶藶熬商陸根蜀漆洗去腥海藻洗去咸各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸大病瘥後胃陰虛者津液不生則口乾欲飲胃陽弱者津液不攝則口不渴而喜唾至久之而尚不了了則必以補益其虛以溫益其陽矣曰胃上有寒者非必有客氣也虛則自生寒耳理中丸補虛溫中之良劑不用湯者不欲以水氣資吐也傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之大邪雖解元氣未復餘邪未盡氣不足則因而生痰熱不除則因而上逆是以虛羸少食而氣逆欲吐也竹葉石膏湯乃白虎湯之變法以其少氣故加參麥之甘以益氣以其氣逆有飲故用半夏之辛以下氣蠲飲且去知母之鹹寒加竹葉之甘涼尤於胃虛有熱者為有當耳竹葉石膏湯方竹葉二把石膏一斤人參三兩粳米半升半夏半升洗甘草二兩炙麥冬一升去心上七味以水一斗煮取六升去滓納粳米煮米熟湯成去米溫服一升日三服病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈脈已解者病邪解而脈已和也微煩微熱也解則不當復煩而日暮微煩者以病新瘥不當與谷而強與之胃虛谷實不能勝之則發煩熱也損谷則愈者謂不可以藥治之但損其穀食則胃自和耳
