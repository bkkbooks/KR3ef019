body:
  text: 卷四陽明篇下陽明明辨法第二表裡虛實生死之辨九條病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯煩熱熱而煩也是為在裡里則雖汗出不當解而反解者知表猶有邪也如瘧者寒熱往來如瘧之狀是為在表表則日晡所不當發熱而反發熱者知里亦成實也是為表裡錯雜之候故必審其脈之浮沉定其邪之所在而後從而治之若脈實者知氣居於里故可下之使從里出脈浮而虛者知氣居於表故可汗之使從表出而下藥宜大承氣湯汗藥宜桂枝湯則天然不易之法矣陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心下懊憹舌上苔白者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之浮而緊陽明表裡之脈然也咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重陽明入里之證然也是為邪已入里而氣連於表內外牽制汗下俱礙是以汗之而邪不能出於表則躁心憒憒然昏亂而譫語火之而熱且擾於中則怵惕煩躁不得眠下之而邪不盡於裡則胃氣徒虛客氣內動心中懊憹若舌上苔白者邪氣盛於上焦故與梔子豉湯以越胸中之邪所謂病在胸中當須吐之是也若渴欲飲水口乾舌燥者則邪氣不在上而在中故以白虎加人參以清胃熱益胃液所謂熱淫於內治以甘寒也若脈浮發熱渴欲飲水小便不利者邪熱不在上中而獨在下故與豬苓湯以利水泄熱兼滋陰氣所謂在下者引而竭之也豬苓湯方豬苓去皮茯苓阿膠滑石碎澤瀉各一兩上五味以水四升先煮四味取二升去滓納阿膠煬消溫服七合日三服陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利小便故也上條於脈浮發熱渴而小便不利之證既著豬苓湯之用矣此條復示豬苓湯之戒謂雖渴欲飲水而汗出多者則不可以豬苓利其小便所以然者汗之與溺同出而異歸者也靈樞云水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天暑衣厚則為汗故雖清濁不同其為腑中之液則一也汗出既多胃液已耗而復以豬苓利之是已燥而益燥也故曰不可與豬苓湯陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之陽明下後其邪既不從里而出又不因下而結其外有熱手足溫者邪雖陷而未深也心中懊憹飢不能食者熱客胸中而胃虛不能納穀也但頭汗出者胸中之熱熏蒸於上而陽受邪氣復不能降而下行也是為邪氣入里而未成聚之證故宜梔子豉湯以徹胸中之邪亦高者因而越之之意也陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也陽明者津液之腑也熱氣入之津為熱迫故多汗反無汗其身如蟲行皮中狀者氣內蒸而津不從之也非陽明久虛之故何致是哉夫實則譫語虛則鄭聲鄭聲重語也實者邪氣盛也虛者精氣奪也邪盛則狂妄多言變亂不測正奪者語不能多惟平時心事言訖復言而已故曰重語重猶疊也直視譫語喘滿者死下利者亦死直視譫語為陰竭熱盛之候此為邪氣日損或陰氣得守猶或可治若喘滿則邪內盛或下利則陰內泄皆死證也發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死汗多復汗陽氣重傷而邪復不解為譫語而脈短譫語為邪之盛脈短為氣之少病盛勝臟故死脈自和者邪氣雖盛而正氣猶足相持故得不死陽明病欲解時從申至戌上申酉戌時日晡時也陽明潮熱發於日晡陽明病解亦於日晡則申酉戌為陽明之時其病者邪氣於是發其解者正氣於是復也陽明可下不可下之辨十五條陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下傷寒以身熱惡寒為在表身熱不惡寒為在裡而陽明病無表證者可下有表證者則不可下此汗出不惡寒身重短氣腹滿而喘潮熱皆里證也脈雖遲猶可攻之以腹滿便閉裡氣不行故脈為之濡滯不利非可比於遲則為寒之例也若手足濈然汗出者陽明熱甚大便已硬欲攻其病非大承氣不為功矣若汗多微發熱惡寒則表猶未解其熱不潮則里亦未實豈可漫與大承氣遺其表而攻其里哉即腹大滿不通而急欲攻之者亦宜與小承氣微和胃氣而不可以大承氣大泄大下恐裡虛邪陷變證百出則難挽救矣以下七條於可攻證而復審其小便之多少大便之溏硬脈之實與不實經之過與不過熱之潮與不潮而後從而治之故知下法不可不慎也陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎可攻之若不轉失氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也陽明病有潮熱者為胃實熱不潮者為胃未實而大承氣湯有燥屎者可與初硬後溏者則不可與故欲與大承氣必先與小承氣恐胃無燥屎邪氣未聚攻之則病未必去而正已大傷也服湯後轉失氣者便堅藥緩屎未能出而氣先下趨也故可更以大承氣攻之不轉失氣者胃未及實但初頭硬後必溏雖小承氣已過其病況可以大承氣攻之哉胃虛無氣脹滿不食所必至矣又陽明病能飲水者為實不能飲水者為虛如雖欲飲而與水則噦所謂胃中虛冷欲飲水者與水則噦也其後卻發熱者知熱氣還入於胃則大便硬而病從虛冷所變故雖硬而仍少也亦不可與大承氣湯但與小承氣微和胃氣而已蓋大承氣為下藥之峻劑仲景恐人不當下而誤下或雖當下而過下故反復辨論如此而又申之曰不轉失氣者慎不可攻也嗚呼仁人之心可謂至矣陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯陽明下後心中懊憹而煩胃中有燥屎者與陽明下後心中懊憹飢不能食者有別矣彼為邪擾於上此為熱實於中也熱實則可攻故宜大承氣若腹微滿初頭硬後必溏者熱而不實邪未及結則不可攻攻之必脹滿不能食也陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也譫語發潮熱胃實之徵也脈滑而疾則與滑而實者差異矣故不與大承氣而與小承氣也若服一升而轉失氣者知有燥屎在胃中可更服一升若不轉失氣者此必初硬後溏不可更與服之一如前二條之意也乃明日不大便而脈反微澀則邪氣未去而正氣先衰補則礙邪攻則傷正故曰難治便雖未通豈可更以承氣攻之哉得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯傷寒能食者為胃熱而不實不能食者為胃熱而實而胃實之證小便數者可攻小便少者則不可攻得病二三日脈不浮而弱而又無太陽柴胡之證知其病獨在陽明之表也煩躁心下硬至四五日不解則里證復具故雖能食亦必以小承氣微和胃氣至六日熱漸成實當更與大承氣一升以盡其病也若不大便六七日於法當下而小便少者則水穀不分知其初硬後溏然雖不能食亦不可便與攻法須俟其小便利屎硬然後以大承氣與之夫不大便而津液竭者不可下須俟其津液還入胃中而大便自行不大便而小便少者亦不可下必俟其津液遍滲水道而後可與下法蓋津液已竭而強攻之則正虛不復大便未硬而輒攻之則邪去不盡學者不可不審而輕用下藥也傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯太陽風寒外束令人頭痛陽明熱氣上衝亦令人頭痛傷寒不大便六七日頭痛有熱證者知其熱盛於裡而氣蒸於上非風寒在表之謂矣故可與承氣湯下之然熱盛於裡者其小便必短赤若小便清者知其熱不在於里而仍在於表當以桂枝湯發其汗而不可以承氣湯攻其里也若頭痛不除者熱留於經必發鼻衄宜桂枝湯四字疑在當鬚髮汗句下此條從太陽篇中移入汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯汗出譫語謂風未去表而胃已成實也故曰有燥屎在胃中又曰此為風也須下之過經乃可下之見胃實須下而風未去表則必過經而後可下不然表間邪氣又將入里胃益增熱而語言錯亂矣表虛里實即表和里病之意言邪氣入而並於里也外臺云里病表和下之則愈汗之則死故宜大承氣以下里實陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻其熱必噦天之邪氣中人則同而人之臟氣虛實則不同此下三條乃為陽明病之中虛不足者設也陽明病當攻其熱而胃中虛冷不能食者則不可攻其熱攻之則中寒益甚而氣乃上逆故必作噦噦厄逆也以下不可攻之證凡七條傷寒嘔多雖有陽明證不可攻之夫陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病面合赤色不可攻之攻之必發熱色黃小便不利陽明雖有可下之例然必表證全無而熱結在腸中者方可攻之若嘔多者邪在膈也心下硬滿者邪未下於胃也面合赤色者邪氣怫鬱在表也故皆不可攻之攻之則裡虛而熱入其淫溢於下者則下利不止其蓄聚於中者則發熱色黃小便不利其或幸而不死者邪氣竟從下奪而愈耳然亦難矣陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也脈遲者氣弱而行不利也氣弱不行則谷化不速谷化不速則穀氣鬱而生熱其熱上衝則作頭眩氣上衝者不下走則小便難而熱之鬱於中者不得下行濁道必將蒸積為黃故曰欲作谷疸然以穀氣鬱而成熱而非胃有實熱故雖下之而腹滿不去不得與脈數胃實者同論也陽明病本自汗出醫更重發汗病已瘥尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也陽明病不大便有熱結與津竭兩端熱結者可以寒下可以咸軟津竭者必津回燥釋而後便可行也茲已汗復汗重亡津液胃燥便硬是當求之津液而不可復行攻逐矣小便本多而今數少則肺中所有之水精不直輸於膀胱而還入於胃府於是燥者得潤硬者得軟結者得通故曰不久必大便出而不可攻之意隱然言外矣陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及大豬膽汁皆可為導前條汗多復汗亡津液大便硬者已示不可攻之意謂須其津液還入胃中而大便自行此條復申不可攻之戒而出蜜煎等潤導之法何慮之周而法之備也總之津液內竭之人其不欲大便者靜以需之其自欲大便者則因而導之仲景成法後人可以守之而無變也蜜煎導方蜜七合一味內銅器中微火煎之稍凝似餳狀攪之勿令焦著欲可丸並手捻作挺令頭鋭大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則艱其脾為約麻仁丸主之浮者陽氣多澀者陰氣少而趺陽見之是為胃強而脾弱約約束也猶弱者受強之約束而氣餒不用也脾不用而胃獨行則水液並趨一處而大便失其潤矣大黃枳實厚朴所以瀉令胃弱麻仁杏仁芍藥所以滋令脾厚用蜜丸者恐速下而傷其脾也蓋即取前條潤導之意而少加之力亦傷寒下藥之變法也麻仁丸方麻仁二升芍藥半升枳實半升大黃一斤杏仁一升厚朴一尺炙去皮上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以知為度陽明雜治法第三發黃證治七條陽明病無汗小便不利心中懊憹者身必發黃陽明病被火額上微汗出小便不利者必發黃邪入陽明寒已變熱若更被火則邪不得去而熱反內增矣且無汗則熱不外越小便不利則熱不下泄蘊蓄不解集於心下而聚於脾間必惡熱為懊憹不安脾以濕應與熱相合勢必蒸郁為黃矣額上雖微汗被火氣劫從炎上之化也豈能解其火邪哉陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴飲水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之熱越熱隨汗而外越也熱越則邪不蓄而散安能發黃哉若但頭汗出而身無汗劑頸而還則熱不得外達小便不利則熱不得下泄而又渴飲水漿則其熱之蓄於內者方熾而濕之引於外者無已濕與熱得瘀郁不解則必蒸發為黃矣茵陳蒿湯苦寒通泄使病從小便出也茵陳蒿湯方茵陳蒿六兩梔子十四枚擘大黃二兩去皮上三味以水一斗二升先煎茵陳減六升納二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之傷寒發汗已熱與汗越不能發黃而反身目為黃者以寒濕深入在裡汗雖出而寒濕不與俱出也寒濕在裡必傷於脾脾傷而色外見則身目為黃是不可比於瘀熱在裡之例而輒用下法也云於寒濕中求之者意非溫脾燥濕不可耳傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之此則熱結在裡之證也身黃如橘子色者色黃而明為熱黃也若濕黃則色黃而晦所謂身黃如薰黃也熱結在裡為小便不利腹微滿故宜茵陳蒿湯下熱通瘀為主也傷寒身黃髮熱者梔子柏皮湯主之此熱瘀而未實之證熱瘀故身黃熱未實故發熱而腹不滿梔子徹熱於上柏皮清熱於下而中未及實故須甘草以和之耳梔子柏皮湯方梔子十五枚擘甘草一兩炙柏皮二兩上三味以水四升煮取一升半去滓分溫再服傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之此亦熱瘀而未實之證瘀熱在裡者汗不得出而熱瘀於裡也故與麻黃杏仁生薑之辛溫以發越其表赤小豆連軺梓白皮之苦寒甘以清熱於裡大棗甘草甘溫悅脾以為散濕驅邪之用用潦水者取其味薄不助水氣也合而言之茵陳蒿湯是下熱之劑梔子柏皮湯是清熱之劑麻黃連軺赤小豆湯是散熱之劑也麻黃連軺赤小豆湯方麻黃二兩生薑二兩切生梓白皮一升連軺二兩甘草二兩炙大棗十二枚擘赤小豆一升杏仁四十粒去皮尖上八味以潦水一斗先煮麻黃再沸去上沫納諸藥煮取三升分溫三服半日服盡蓄血證治二條陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之喜忘即善忘蓄血者熱與血蓄於血室也以衝任之脈並陽明之經而其人又本有瘀血久留不去適與邪得即蓄積而不解也蓄血之證其大便必硬然雖硬而其出反易者熱結在血而不在糞也其色必黑者血瘀久而色變黑也是宜入血破結之劑下其瘀血血去則熱亦不留矣病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解而下不止必協熱而便膿血也無表裡證與前第二十五條同發熱七八日而無太陽表證知其熱盛於內而氣蒸於外也脈雖浮數亦可下之以除其熱令身熱去脈數解則愈假令已下脈浮去而數不解知其熱不在氣而在血也熱在血則必病於血而其變亦有二合猶並也言熱氣並於胃為消穀善飢至六七日不大便者其血必蓄於中若不並於胃而下利不止者其血必走於下蓄於中者為有瘀血宜抵當湯結者散之亦留者攻之也走於下者為協熱而便膿血則但宜入血清熱而已
