body:
  text: 卷二太陽篇下太陽救逆法第四論結胸臟結之異三條問曰病有結胸有臟結其狀如何答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白苔滑者難治此設為問答以辨結胸臟結之異結胸者邪結胸中按之則痛臟結者邪結臟間按之亦痛如結胸者謂如結胸之按而痛也然胸高而臟下胸陽而臟陰病狀雖同而所處之位則不同是以結胸不能食臟結則飲食如故結胸不必下利臟結則時時下利結胸關脈沉臟結則更小細緊而其病之從表入里與表猶未盡之故則又無不同故結胸臟結其寸脈俱浮也舌上白苔滑者在裡之陽不振入結之邪已深結邪非攻不去而臟虛又不可攻故曰難治臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也邪結在臟必陽氣內動或邪氣外達而後可施攻取之法若無陽證不往來寒熱則內動外達之機俱泯是以其人反靜其舌苔反滑邪氣伏而不發正氣弱而不振雖欲攻之無可攻已蓋即上文難治之端而引其說如此病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死臟結之證不特傷寒即雜病亦有之曰脅下素有痞則其病久而非暴矣曰連在臍旁痛引少腹入陰筋則其邪深而非淺矣既深且久攻之不去補之無益雖不卒死亦無愈期矣故曰死論結胸及痞之源一條病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也此原所以結胸與痞之故病發於陽者邪在陽之經病發於陰者邪在陰之經也陽經受邪郁即成熱其氣內陷則為結胸陰經受邪未即成熱其氣內陷則作痞所以然者病邪在經本當發散而反下之裡氣則虛邪氣因入與飲相摶而為病也要之陽經受邪原有可下之例特以里未成實而早行下法故有結胸之變證審其當下而後下之何至是哉仲景復申明所以成結胸之故而不及痞豈非以陰經受邪則無論遲早俱未可言下耶論結胸證治十條太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃也脈浮動數皆陽也故為風為熱為痛而數則有正為邪迫失其常度之象故亦為虛頭痛發熱微盜汗出而復惡寒為邪氣在表法當發散而反下之正氣則虛邪氣乃陷動數變遲者邪自表而入里則脈亦去陽而之陰也膈內拒痛者邪欲入而正拒之正邪相擊則為痛也胃中空虛客氣動膈者胃氣因下而裡虛客氣乘虛而動膈也短氣躁煩心中懊憹者膈中之飲為邪所動氣乃不舒而神明不寧也由是陽邪內陷與飲相結痞硬不消而結胸之病成矣大陷胸湯則正治陽邪內結胸中之藥也若其不結胸者熱氣散漫既不能從汗而外泄亦不得從溺而下出蒸郁不解浸淫肌體勢必發黃也大陷胸湯方大黃六兩芒硝一升甘遂一錢匕上三味水六升先煮大黃取二升去滓納芒硝煮一二沸納甘遂末溫服一升得快利止後服按大陷胸與大承氣其用有心下與胃中之分以愚觀之仲景所云心下者正胃之謂所云胃中者正大小腸之謂也胃為都會水穀並居清濁未分邪氣入之夾痰雜食相結不解則成結胸大小腸者精華已去糟粕獨居邪氣入之但與穢物結成燥糞而已大承氣專主腸中燥糞大陷胸並主心下水食燥糞在腸必藉推逐之力故須枳朴水食在胃必兼破飲之長故用甘遂且大承氣先煮枳朴而後納大黃大陷胸先煮大黃而後納諸藥夫治上者制宜緩治下者制宜急而大黃生則行速熟則行遲蓋即一物而其用又有不同如此傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之邪氣內結既熱且實脈復沉緊有似大承氣證然結在心下而不在腹中雖接之石硬而痛亦是水食互結與陽明之燥糞不同故宜甘遂之破飲而不宜枳朴之散氣如上條之說也傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之熱結在裡而復往來寒熱是謂表裡俱實不得以十餘日之久而獨治其里也故宜大柴胡表裡兩解之法若但結胸而無大熱如口燥渴心煩等證者此為水飲結在胸脅之間所謂水結胸者是也蓋邪氣入里必挾身中所有以為依附之地是以在腸胃則結於糟粕在胸膈則結於水飲各隨其所有而為病耳水結在胸而但頭汗出者邪膈於上而氣不下通也故與大陷胸湯以破飲而散結太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之汗下之後津液重傷邪氣內結不大便五六日舌上燥而渴日晡所小有潮熱皆陽明胃熱之徵也從心下至少腹硬滿而痛不可近則不特徵諸兆抑且顯諸形矣乃不用大承氣而用大陷胸者亦以水食互結且雖至少腹而未離心下故也不然下證悉具下藥已行何以不臣枳朴而臣甘遂哉結胸者項亦強如柔痓狀下之則和宜大陷胸丸痓病之狀頸項強直結胸之甚者熱與飲結胸膈緊貫上連於項但能仰而不能俯亦如痓病之狀也曰柔而不曰剛者以陽氣內陷者必不能外閉而汗常自出耳是宜下其胸中結聚之實則強者得和而愈然胸中盛滿之邪固非小陷胸所能去而水熱互結之實亦非承氣湯所可治故與葶藶之苦甘遂之辛以破結飲而泄氣閉杏仁之辛白蜜之甘以緩下趨之勢而去上膈之邪其芒硝大黃則資其軟堅蕩實之能大陷胸丸方大黃半斤葶藶半斤芒硝半斤杏仁半升去皮尖熬上四味搗篩二味納杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法按湯者蕩也蕩滌邪穢欲使其淨盡也丸者緩也和理臟腑不欲其速下也大陷胸丸以蕩滌之體為和緩之用蓋以其邪結在胸而至如柔痓狀則非峻藥不能逐之而又不可以急劑一下而盡故變湯為丸煮而並渣服之乃峻藥緩用之法峻則能勝破堅蕩實之任緩則能盡際上迄下之邪也小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之胸中結邪視結胸較輕者為小結胸其證正在心下按之則痛不似結胸之心下至少腹硬滿而痛不可近也其脈浮滑不似結胸之脈沉而緊也是以黃連之下熱輕於大黃半夏之破飲緩於甘遂栝蔞之潤利和於芒硝而其蠲除胸中結邪之意則又無不同也故曰小陷胸湯小陷胸湯方黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞實取三升去滓納諸藥煮取二升去滓分溫三服病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服病在陽者邪在表也當以藥取汗而反以冷水潠之或灌濯之其熱得寒被劫而又不得竟去於是熱伏水內而彌更益煩水居熱外而肉上粟起而其所以為熱亦非甚深而極盛也故意欲飲水而口反不渴文蛤鹹寒而性燥能去表間水熱互結之氣若服之而不瘥者其熱漸深而內傳入本也五苓散辛散而淡滲能去膀胱與水相得之熱若其外不鬱於皮膚內不傳於膀胱則水寒之氣必結於胸中而成寒實結胸寒實者寒邪成實與結胸熱實者不同審無口燥渴煩等證見者當與三物白散溫下之劑以散寒而除實也本文小陷胸湯及亦可服七字疑衍蓋未有寒熱而仍用黃連栝蔞者或久而變熱者則亦可與服之耳文蛤散方文蛤五兩為散以沸湯和一錢匕服湯用五合三物白散方桔梗三分貝母三分巴豆一分去皮心熬黑上三味為末納巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水潠之洗之益令熱劫不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩太陽病未罷而並於少陽法當和散如柴胡加桂枝之例而反下之陽邪內陷則成結胸亦如太陽及少陽誤下之例也但邪既上結則當不復下注乃結胸心下硬而又下利不止者邪氣甚盛而淫溢上下也於是胃氣失其和而水漿不下邪氣亂其心而煩擾不寧所以然者太少二陽之熱並而入里充斥三焦心胃之間故其為病較諸結胸有獨甚焉仲景不出治法者非以其盛而不可制耶結胸證其脈浮大者不可下下之則死結胸證原有可下之例如大陷胸湯及丸諸法是也若其脈浮大者心下雖結而表邪猶盛則不可徑與下法下之則臟氣重傷邪氣復入既不能受又不可制則難為生矣故曰下之則死結胸證悉具煩躁者死下利者亦死傷寒邪欲入而煩躁者正氣與邪爭也邪既結而煩躁者正氣不勝而將欲散亂也結胸證悉具謂脈沉緊心下痛按之石硬及不大便舌上燥而渴日晡所潮熱如上文所云是也而又煩躁不寧則邪結甚深而正虛欲散或下利者是邪氣淫溢際上極下所謂病勝臟者也雖欲不死其可得乎痞證七條脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳此申言所以成痞之故浮而緊者傷寒之脈所謂病發於陰也緊反入里者寒邪因下而內陷與熱入因作結胸同意但結胸心下硬滿而痛痞則按之濡而不硬且痛所以然者陽邪內陷止於胃中與水穀相結則成結胸陰邪內陷止於胃外與氣液相結則為痞是以結胸為實而按之硬痛痞病為虛而按之自濡耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之按成氏云心下硬按之痛關脈沉者實熱也心下痞按之濡關上浮者虛熱也與大黃黃連以導其虛熱成氏所謂虛熱者對燥屎而言也非陰虛陽虛之謂蓋熱邪入里與糟粕相結則為實熱不與糟粕相結即為虛熱本方以大黃黃連為劑而不用枳朴芒硝者蓋以泄熱非以蕩實也麻沸湯者煮水小沸如麻子即以煮藥不使盡藥力也大黃黃連瀉心湯方大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服心下痞而復惡寒汗出者附子瀉心湯主之此即上條而引其說謂心下痞按之濡關脈浮者當與大黃黃連瀉心湯瀉心下之虛熱若其人復惡寒而汗出證兼陽虛不足者又須加附子以復表陽之氣乃寒熱並用邪正兼治之法也附子瀉心湯方大黃二兩黃連一兩黃芩一兩附子一枚炮去皮破別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫三服按此證邪熱有餘而正陽不足設治邪而遺正則惡寒益甚或補陽而遺熱則痞滿愈增此方寒熱補瀉並投互治誠不得已之苦心然使無法以制之鮮不混而無功矣方以麻沸湯漬寒藥別煮附子取汁合和與服則寒熱異其氣生熟異其性藥雖同行而功則各奏乃先聖之妙用也傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯結胸及痞不特太陽誤下有之即少陽誤下亦有之柴胡湯證具者少陽嘔而發熱及脈弦口苦等證具在也是宜和解而反下之於法為逆若柴胡證仍在者復與柴胡湯和之即愈此雖已下之不為逆也蒸蒸而振者氣內作而與邪爭勝則發熱汗出而邪解也若無柴胡證而心下滿而硬痛者則為結胸其滿而不痛者則為痞均非柴胡所得而治之者矣結胸宜大陷胸湯痞宜半夏瀉心湯各因其證而施治也半夏瀉心湯方黃芩三兩人參三兩甘草三兩黃連一兩半夏半升洗乾薑三兩大棗十二枚上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服按痞者滿而不實之謂夫客邪內陷即不可從汗泄而滿而不實又不可從下奪故惟半夏乾薑之辛能散其結黃連黃芩之苦能泄其滿而其所以泄與散者雖藥之能而實胃氣之使也用參草棗者以下後中虛故以之益氣而助其藥之能也傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之汗解之後胃中不和既不能運行真氣並不能消化飲食於是心中痞硬乾噫食臭金匱所謂中焦氣未和不能消穀故令人噫是也噫噯食氣也脅下有水氣腹中雷鳴下利者土德不及而水邪為殃也故以瀉心消痞加生薑以和胃按上條本少陽病不宜入太陽篇中此條汗解後病亦不得謂之逆而俱列於此者所以備諸瀉心之用也生薑瀉心湯方生薑四兩切人參三兩半夏半升洗甘草三兩炙黃芩三兩大棗十二枚擘黃連一兩乾薑一兩上八味以水一斗煮取六升去滓再煮取三升溫服一升日三服傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒中風者成氏所謂傷寒或中風者是也邪盛於表而反下之為下利穀不化腹中雷鳴為心下痞硬而滿為乾嘔心煩不得安是表邪內陷心間而復上攻下注非中氣空虛何致邪氣淫溢至此哉醫以為結熱未去而復下之是已虛而益虛也虛則氣不得化邪愈上逆而痞硬有加矣故與瀉心消痞加甘草以益中氣甘草瀉心湯方甘草四兩黃芩三兩乾薑三兩黃連一兩半夏半升洗大棗十二枚擘上六味以水一斗煮取六升去滓再煮取三升溫服一升日三服按生薑瀉心湯甘草瀉心湯二方雖同為治痞之劑而生薑瀉心意在胃中不和故主生薑以和胃甘草瀉心意在下利不止與客氣上逆故不用人參之增氣而須甘草之安中也傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯大下復汗正虛邪入心下則痞當與瀉心湯如上法矣若其人惡寒者邪雖入里而表猶未罷則不可徑攻其痞當先以桂枝湯解其表而後以大黃黃連瀉心湯攻其痞不然恐痞雖解而表邪復入里為患也況痞亦未必能解耶按傷寒下後結胸痞滿之外又有懊憹煩滿下利等證蓋邪入里而未集而其位又高則為懊憹其已集而稍下者則為結胸及痞其最下而亦未結者則為下利結胸痞滿具如上文凡十七條以下凡十一條則備舉懊憹下利諸證也懊憹煩滿證治六條發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之發汗吐下後正氣既虛邪氣亦衰乃虛煩不得眠甚則反復顛倒心中懊憹者未盡之邪方入里而未集已虛之氣欲勝邪而不能則煩亂不寧甚則心中懊憹鬱悶而不能自已也梔子體輕味苦微寒豉經蒸罯可升可降二味相合能徹散胸中邪氣為除煩止躁之良劑少氣者呼吸少氣不足以息也甘草之甘可以益氣嘔者氣逆而不降也生薑之辛可以散逆得吐則邪氣散而當愈不可更吐以傷其氣故止後服梔子豉湯方梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去滓分二服溫進一服得吐止後服梔子甘草豉湯方於梔子豉湯內加入甘草二兩余依前法梔子生薑豉湯方於梔子豉湯內加入生薑五兩余依前法發汗若下之而煩熱胸中窒者梔子豉湯主之傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之煩熱者心煩而身熱也胸中窒者邪入胸間而氣窒不行也蓋亦汗下後正虛邪入而猶未集之證故亦宜梔子豉湯散邪徹熱為主也心中結痛者邪結心間而為痛也然雖結痛而身熱不去則其邪亦未盡入與結胸之心下痛而身不熱者不同此梔子豉湯之散邪徹熱所以輕於小陷胸之蕩實除熱也傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之下後心煩證與上同而加腹滿則邪入較深矣成氏所謂邪氣壅於心腹之間者是也故去香豉之升散而加枳朴之降泄若但滿而不煩則邪入更深又當去梔子之輕清而加大黃之沉下矣此梔子厚朴湯所以重於梔豉而輕於承氣也梔子厚朴湯方梔子十四枚擘厚朴四兩薑汁炒枳實四枚水浸去穰炒上三味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之大下後身熱不去證與前同乃中無結痛而煩又微而不甚知正氣虛不能與邪爭雖爭而亦不能勝之也故以梔子徹胸中陷入之邪乾薑復下藥損傷之氣梔子乾薑湯方梔子十四枚乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐止後服凡用梔子湯病人舊微溏者不可與服之病人舊微溏者未病之先大便本自微溏為裡虛而寒在下也梔子湯本湧泄胸中客熱之劑舊微溏者中氣不固與之恐藥氣乘虛下泄而不能上達則膈熱反因之而深入也故曰不可與服之下利脈證五條太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之太陽中風發熱本當桂枝解表而反下之裡虛邪入利遂不止其脈則促其證則喘而汗出夫促為陽盛脈促者知表未解也無汗而喘為寒在表喘而汗出為熱在裡也是其邪陷於裡者十之七而留於表者十之三其病為表裡並受之病故其法亦宜表裡兩解之法葛根黃連黃芩湯葛根解肌於表芩連清熱於裡甘草則合表裡而並和之耳蓋風邪初中病為在表一入於裡則變為熱矣故治表者必以葛根之辛涼治里者必以芩連之苦寒也而古法汗者不以偶下者不以奇故葛根之表則數多而獨行芩連之裡則數少而並須仲景矩矱秩然不紊如此葛根黃連黃芩湯方葛根半斤甘草二兩炙黃芩二兩黃連三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之太陽誤下自利而又表裡不解與上條同然曰數下則氣屢傷矣曰利下不止則虛復甚矣雖心下痞硬亦是正虛失運之故是宜桂枝之辛以解其表參朮薑草之甘溫以安其里而不可以葛根攻表亦不得以芩連清裡治如上條之例矣桂枝人參湯方桂枝四兩乾薑三兩白朮三兩人參三兩炙甘草四兩上五味以水九升先煮四味取五升納桂更煮取三升溫服一升日再夜一服傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯傷寒下後邪氣變熱乘虛入里者則為挾熱下利其邪未入里而臟虛生寒者則為下利清穀各因其人邪氣之寒熱與臟氣之陰陽而為病也身疼痛者邪在表也然臟氣不充則無以為發汗散邪之地故必以溫藥舍其表而救其里服後清便自調裡氣已固而身痛不除則又以甘辛發散為急不然表之邪又將入里而增患矣而救里用四逆救表用桂枝與厥陰篇下利腹脹滿身疼痛條略同彼為寒邪中陰此為寒藥傷里而其溫中散邪先表后里之法則一也太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也太陽病二三日為病未久也不能臥但欲起者心下結滿臥則氣愈壅而不安也脈微弱陽氣衰少也夫二三日為病未久則寒未變熱而脈又微弱知其結於心下者為寒分而非熱分矣寒分者病屬於寒故謂寒分猶金匱所謂血分氣分水分也寒則不可下而醫反下之裡虛寒入必為下利不止若利止必作結胸者寒邪從陽之化而上結於陽位也若未止四日復下之者寒已變熱轉為協熱下利故須復下以盡其邪所謂在下者引而竭之也總之寒邪中人久必變熱而邪不上結勢必下注仲景反復詳論所以詔示後人者深矣傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便湯藥亦下藥也下後下利痞硬瀉心湯是已而復以他藥下之以虛益虛邪氣雖去下焦不約利無止期故不宜參朮薑草之安中而宜赤脂禹糧之固下也乃服之而利猶不止則是下焦分注之所清濁不別故也故當利其小便赤石脂禹餘糧湯方赤石脂一斤碎禹餘糧一斤碎上二味以水六升煮取二升去滓分溫三服下後諸變證治八條太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血此因結胸而並詳太陽誤下諸變謂脈促為陽盛而不結於胸則必無下利痞滿之變其邪將從外解若脈浮者下後邪已入里而猶在陽分則必作結胸矣脈緊者太陽之邪傳入少陰之絡故必咽痛所為脈緊者屬少陰又邪客於足少陰之絡令人咽痛不可內食是也脈弦者太陽之邪傳入少陽之經故必兩脅拘急所為尺寸俱弦者少陽受病其脈循脅絡於耳故也脈細為氣少數為陽脈氣不足而陽有餘乃邪盛於上也故頭痛未止脈沉為在裡緊為寒脈邪入里而正不容則內為格拒故必欲嘔脈沉滑者熱勝而在下也故協熱利脈浮滑者陽勝而陰傷也故必下血經曰不宜下而更攻之諸變不可勝數此之謂也以下並太陽下後之證而或胸滿或喘或煩驚譫語或脅痛發黃是結胸痞滿煩躁下利外尚有種種諸變如此太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之陽邪被抑不復浮盛於表亦未結聚於裡故其胸滿其脈促促者數而時一止也夫促為陽脈胸中為陽之府脈促胸滿則雖誤下而邪氣仍在陽分故以桂甘薑棗甘辛溫藥從陽引而去之去芍藥者恐酸寒氣味足以留胸中之邪且奪桂枝之性也若微惡寒者其人陽不足必加附子以助陽氣而逐陽邪設徒與前法則藥不及病雖病不增劇亦必無濟矣桂枝去芍藥湯方於桂枝湯內去芍藥余依前法桂枝去芍藥加附子湯方於桂枝湯方內去芍藥加附子一枚炮去皮破八片余依前法太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之喘家作桂枝湯加厚朴杏仁佳太陽誤下無結胸下利諸變而但微喘知其里未受病而其表猶未解胸中之氣為之不利也故與桂枝湯解表散邪加厚朴杏仁下氣定喘然喘之為病所關非細而誤下之後其變實多仲景此條蓋可以互證而難以獨引亦如太陽病脈浮者可發汗宜麻黃湯之文也學者辨諸太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之病在太陽而反下之正氣遂虛邪氣則陷乃其氣反上衝者陽邪被抑而復揚仍欲出而之表也故可與桂枝湯從陽引而去之因其輕而揚之之意也用前法者即啜熱稀粥以助藥力之法蓋欲以救被傷之氣而引欲出之邪耳若不上衝者邪已內陷不復外攻當隨脈證而調其內不可更以桂枝攻其表也傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒下後其邪有並歸一處者如結胸下利諸候是也有散漫一身者如此條所云諸證是也胸滿者邪痹於上小便不利者邪痹於下煩驚者邪動於心譫語者邪結於胃此病之在裡者也一身盡重不可轉側者筋脈骨肉並受其邪此病之在表者也夫合表裡上下而為病者必兼陰陽合散以為治方用柴胡桂枝以解其外而除身重龍蠣鉛丹以鎮其內而止煩驚大黃以和胃氣止譫語茯苓以泄膀胱利小便人參薑棗益氣養營衛以為驅除邪氣之本也如是表裡虛實泛應曲當而錯雜之邪庶幾盡解耳柴胡加龍骨牡蠣湯方半夏二合洗柴胡四兩人參龍骨鉛丹牡蠣熬茯苓桂枝生薑各一兩半大棗六枚大黃二兩上十一味以水八升煮取四升納大黃切如棋子更煮一二沸去滓溫服一升得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦病六七日脈浮不去惡風寒不除其邪猶在表也醫反二三下之胃氣重傷邪氣入里則不能食而脅下滿痛且面目及身黃頸項強小便難所以然者其人脈遲弱而不數手足溫而不熱為太陰本自有濕而熱又入之相得不解交蒸互郁而面目身體悉黃矣頸項強者濕痹於上也脅下滿痛者濕聚於中也小便難者濕不下走也皆與熱相得之故也醫以其脅下滿痛與柴胡湯以解其邪後必下重者邪外解而濕下行將欲作利也設熱濕併除則汗液俱通而愈矣何至下重哉本渴而飲水嘔者金匱所謂先渴卻嘔者為水停心下此屬飲家也飲在心下則食谷必噦所謂諸嘔吐谷不得下者小半夏湯主之是也豈小柴胡所能治哉本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之下後成痞與瀉心湯於法為當矣乃痞不解而其人口燥煩渴小便不利者此非痞也乃熱邪與水蓄而不行也水蓄不行則土失其潤而口燥煩渴下迷其道而小便不利瀉心湯不中與矣五苓散散水泄熱使小便利則痞與煩渴俱止耳下後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯此與汗後不可更行桂枝湯條大同雖汗下不同其為邪入肺中則一故其治亦同誤汗下及吐後諸變脈證十三條本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之此為逆也若先下之治不為逆此泛言汗下之法各有所宜當隨病而施治不可或失其度也如頭痛發熱惡寒者本當發汗而反下之是病在表而治其里也故曰逆腹滿便閉惡熱者本當下之而反汗之是病在裡而治其表也故亦為逆若審其當汗而汗之或當下而下之則亦何逆之有外臺云表病里和汗之則愈下之則死里病表和下之則愈汗之則死不可不慎也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之既汗復下邪氣不從表散而又不從里出者以其脈浮而邪在外故雖復下之而病不愈也夫病在外者仍須從外引而去之今雖已汗下而其脈仍浮知其邪猶在外故須桂枝湯解散外邪則愈少陽篇云柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯必蒸蒸而振卻發熱汗出而解與此同意所當互參太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後復下之下之則傷其里汗之則傷其表既下復汗表裡俱虛而邪仍不解其人則因而為冒冒昏冒也以邪氣蔽其外陽氣被郁欲出不能則時自昏冒如有物矇蔽之也若得汗出則邪散陽出而冒自愈金匱云冒家欲解必大汗出也然亦正氣得復而後汗自出耳豈可以藥強發之哉若汗出冒解而里未和者然後復下之以和其里所謂里病表和下之而愈是也大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈既下復汗重亡津液大邪雖解而小便不利是未可以藥利之俟津液漸回則小便自行而愈若強利之是重竭其陰也況未必即利耶下之後復發汗必振寒脈微細所以然者以內外俱虛故也振寒振栗而寒也脈微為陽氣虛細為陰氣少既下復汗身振寒而脈微細者陰陽並傷而內外俱虛也是必以甘溫之劑和之養之為當矣下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身不大熱者乾薑附子湯主之大法晝靜夜劇病在腎陰夜靜晝劇病在胃陽汗下之後晝日煩躁不得眠夜而安靜者邪未盡而陽已虛晝日陽虛欲復而與邪爭則煩躁不得眠夜而陰旺陽虛不能與邪爭則反安靜也不嘔不渴里無熱也身無大熱表無熱也而又無頭痛惡寒之表證其脈又不浮而沉不洪而微其為陽氣衰少無疑故當與乾薑附子以助陽虛而逐殘陰也以上三條並是汗下後小便不利者傷其陰也振寒脈微細者陰陽並傷也晝日煩躁不得眠夜而安靜者傷陽而不及陰也於此見病變之不同乾薑附子湯方乾薑一兩附子一枚生用去皮切八片上二味以水三升煮取一升去滓頓服發汗若下之病仍不解煩躁者茯苓四逆湯主之發汗若下不能盡其邪而反傷其正於是正氣欲復而不得復邪氣雖微而不即去正邪交爭乃生煩躁是不可更以麻桂之屬逐其邪及以梔豉之類止其煩矣是方乾薑生附之辛所以散邪茯苓人參甘草之甘所以養正乃強主弱客之法也茯苓四逆湯方茯苓六兩人參一兩乾薑一兩半甘草二兩炙附子一枚生用去皮破八片上五味以水五升煮取三升去滓溫服七合日三服按汗下後煩躁一證悉是正虛邪擾之故而有邪多虛少或虛多邪少之分邪多者宜逐邪以安正虛多者宜助正以逐邪仲景既著梔豉湯之例復列茯苓四逆之法其於汗下後煩躁一證虛實互舉補瀉不遺如此學者所當究心也傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之此上中下三焦俱病而其端實在胃中邪氣即寒淫之氣胃中者沖氣所居以為上下升降之用者也胃受邪而失其和則升降之機息而上下之道塞矣成氏所謂陰不得升而獨治其下為下寒腹中痛陽不得降而獨治於上為胸中熱欲嘔吐者是也故以黃連之苦寒以治上熱桂枝之甘溫以去下寒上下既平升降乃復然而中焦不治則有升之而不得升降之而不得降者矣故必以人參半夏乾薑甘草大棗以助胃氣而除邪氣也此蓋痞證之屬多從寒藥傷中後得之本文雖不言及而其為誤治後證可知故其藥亦與瀉心相似而多桂枝耳黃連湯方黃連桂枝去皮乾薑甘草炙各三兩人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二服太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之故也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆病在表而醫吐之邪氣雖去胃氣則傷故自汗出無寒熱而脈細數也一二日胃氣本和吐之則胃空思食故腹中飢而胃氣因吐而上逆則又口不能食也三四日胃氣生熱吐之則其熱上動故不喜糜粥欲食冷食而胃氣自虛不能消穀則又朝食而暮吐也此非病邪應爾以醫吐之所致曰小逆者謂邪已去而胃未和但和其胃則病必自愈傷寒吐下後復發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿吐下復汗津液疊傷邪氣陷入則為虛煩虛煩者正不足而邪擾之為煩心不寧也至八九日正氣復邪氣退則愈乃反心下痞硬脅下痛氣上衝咽喉眩冒者邪氣摶飲內聚而上逆也內聚者不能四布上逆者無以逮下夫經脈者資血液以為用者也汗吐下後血液之所存幾何而復摶結為飲不能布散諸經譬如魚之失水能不為之時時動惕耶且經脈者所以綱維一身者也今既失浸潤於前又不能長養於後必將筋膜乾急而攣或樞折脛縱而不任地如內經所云脈痿筋痿之證也故曰久而成痿太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也病在表而吐之邪氣雖去胃氣生熱則為內煩內煩者熱從內動而生煩也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔知極吐下也過經者病過一經不復在太陽矣詳見陽明篇中心下溫溫欲吐而胸中痛者上氣因吐而逆不得下降也與病人欲吐者不同大便溏而不實者下氣因下而注不得上行也與大便本自溏者不同設見腹滿鬱郁微煩知其熱積在中者猶甚則必以調胃承氣以盡其邪矣邪盡則不特腹中之煩滿釋即胸中之嘔痛亦除矣此因勢利導之法也若不因吐下而致者則病人欲吐者與大便自溏者均有不可下之戒豈可漫與調胃承氣湯哉但欲嘔腹下痛有似柴胡證而系在極吐下後則病在中氣非柴胡所得而治者矣所以知其為極吐大下者以大便溏而仍復嘔也不然病既在下豈得復行於上哉太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之若與或同言或汗或吐或下或溫針而病仍不解即為壞病不必諸法雜投也壞病者言為醫藥所壞其病形脈證不復如初不可以原法治也故曰桂枝不中與也須審其脈證知犯何逆而後隨證依法治之火逆十條脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮者病在表不以汗解而以火攻肌腠未開則邪無從出反因火氣而熱乃盛也夫陽邪被迫而不去者則必入而之陰病從腰以下重而痹者邪因火迫而在陰也故曰火逆微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈微數者虛而有熱是不可以火攻而反灸之熱得火氣相合為邪則為煩逆煩逆者內煩而火逆也血被火迫謂之追虛熱因火動謂之逐實由是血脈散亂而難復筋骨焦枯而不澤火之為害何如耶脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血此火邪迫血而血上行者也脈浮熱甚此為表實古法瀉多用針補多用灸醫不知而反灸之是實以虛治也兩實相合迫血妄行必咽燥而唾血太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪此火邪迫血而血下行者也太陽表病用火熏之而不得汗則邪無從出熱氣內攻必發躁也六日傳經盡至七日則病當解若不解火邪迫血下走腸間則必圊血圊血便血也太陽傷寒者加溫針必驚也寒邪在表不以汗解而以溫針心虛熱入必作驚也成氏曰溫針損營血而動心氣太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治風為陽邪火為陽氣風火交煽是為兩陽陽盛而熱勝為發黃陽盛則血亡而陰竭為欲衄為小便難也陰陽俱虛竭非陽既盛而復虛也盛者陽邪自盛虛者陽氣自虛也身體枯燥以下並陰陽虛竭火氣熏灼之徵於法不治乃小便本難而反利知其陰氣未絶猶可調之使復也故曰其人可治太陽病二日反躁反尉其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數反多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病二日不應發躁而反躁者熱氣行於里也是不可以火攻之而反尉其背汗出熱入胃乾水竭為躁煩為譫語勢有所必至者至十餘日火氣漸衰陰氣復生忽振栗自下利者陽得陰而和也故曰欲解因原其未得利時其人從腰以下無汗欲小便不得者陽不下通於陰也反嘔者陽邪上逆也欲失溲足下惡風者陽上逆足下無氣也大便硬津液不下行也諸皆陽氣上盛升而不降之故及乎津液入胃大便得行於是陽氣暴降而頭反痛穀氣得下而足心熱則其腰下有汗小便得行可知其不嘔不失溲又可知矣火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之火逆復下已誤復誤又加燒針火氣內迫心陽內傷則生煩躁桂枝甘草以復心陽之氣牡蠣龍骨以安煩亂之神此與下條參看更明桂枝甘草龍骨牡蠣湯方桂枝炙甘草各一兩牡蠣龍骨各二兩上為末以水五升煮取二升半去滓溫服八合日三服傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆陽主之陽者心之陽即神明也亡陽者火氣通於心神被火迫而不守此與發汗亡陽者不同發汗者搖其精則厥逆筋惕肉瞤故當用四逆被火者動其神則驚狂起臥不安故當用龍蠣其去芍藥者蓋欲以甘草急復心陽而不須酸味更益營氣也與發汗後其人叉手自冒心心下悸欲得按者用桂枝甘草湯同意蜀漆即常山苗味辛能去胸中邪結氣此證火氣內迫心包故須之以逐邪而安正耳桂枝去芍藥加蜀漆牡蠣龍骨救逆湯方桂枝三兩生薑三兩切蜀漆三兩洗去腥甘草二兩炙牡蠣五兩熬龍骨四兩大棗十二枚擘上為末以水一斗二升先煮蜀漆減二升納諸藥煮取三升去滓溫服一升燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯燒針發其汗針處被寒者故寒雖從汗而出新寒復從針孔而入也核起而赤者針處紅腫如核寒氣所郁也於是心氣因汗而內虛腎氣乘寒而上逆則發為奔豚氣從少腹上衝心也灸其核上以杜再入之邪與桂枝加桂以泄上逆之氣桂枝加桂湯方於桂枝湯方內更加桂二兩共五兩余依前法太陽類病法第五溫病一條太陽病發熱而渴不惡寒者為溫病此溫病之的證也溫病者冬春之月溫暖太甚所謂非節之暖人感之而即病者也此正是傷寒對照處傷寒變乃成熱故必傳經而後渴溫邪不待傳變故在太陽而即渴也傷寒陽為寒鬱故身發熱而惡寒溫病陽為邪引故發熱而不惡寒也然其脈浮身熱頭痛則與傷寒相似所以謂之傷寒類病云風溫一條若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期此風溫之的脈的證也亦是傷寒反照處傷寒寒邪傷在表汗之則邪去而熱已風溫溫與風得汗之則風去而溫勝故身灼熱也且夫風溫之病風傷陽氣而溫損陰氣故脈陰陽俱浮不似傷寒之陰陽俱緊也風泄津液而溫傷肺氣故自汗出身重不同傷寒之無汗而體痛也多眠睡者熱勝而神昏也鼻息鼾語言難出者風溫上壅湊於肺也是當以辛散風而涼勝溫乃不知而遽下之則適以傷臟陰而陷邪氣臟陰傷則小便難目直視邪氣陷則時復失溲也被火如溫針灼艾之屬風溫為陽邪火為陽氣以陽遇陽所謂兩陽相熏灼其身必發黃也然火微則薰於皮膚而身發黃色火劇則逼入心臟而如發驚癇且風從火出而時時瘛瘲乃所以為逆也若已被火而復以火熏之是謂逆而再逆一逆尚延時日再逆則促命期此醫家之大罪也仲景示人風溫溫病之大戒加此按傷寒序例云從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒至冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發外冬時伏寒變為溫病從春分以後至秋分節前天有暴寒者皆為時行寒疫也又曰若更感異氣變為他病者當依壞證病而治之若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫夫所謂冬溫寒疫者皆非其時而有其氣即所謂天行時氣也所謂變為溫病者乃是冬時伏寒發於春時陽氣即春溫也所謂變為溫瘧者本是溫熱之病重感新寒熱為寒鬱故為瘧也所謂變為風溫者前風未絶而後風繼之以陽遇陽相得益熾也所謂變為溫毒者前熱未已而又感溫熱表裡皆熱蘊隆為患故謂毒也所謂變為溫疫者本有溫病而又感厲氣故為溫疫也夫治病者必先識病欲識病者必先正名名正而後證可辨法可施矣惜乎方法並未專詳然以意求之無不可得在人之致力何如耳痙病七條太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出不惡寒者名曰柔痙此分痙病剛柔之異以無汗惡寒者為陰為剛有汗不惡寒者為陽為柔陰性徑切而陽性舒散也然必兼有頭動面赤口噤背反張頸項強等證仲景不言者以痙字該之也不然何異太陽中風傷寒證而謂之痙證耶活人亦云痙證發熱惡寒與傷寒相似但其脈沉遲弦細而項背反張為異耳太陽病發熱脈沉而細者名曰痙為難治太陽脈本浮今反沉者風得濕而伏也痙脈本緊弦今反細者真氣適不足也攻則正不能任補則邪不得去此痙病之難治者也太陽病發汗太多因致痙痙病有太陽風寒不解重感寒濕而成者亦有亡血竭氣損傷陰陽筋脈不榮而變成痙者病在太陽發汗太多因致成痙知其為液脫筋急之痙而非風淫濕鬱之痙矣經云氣主煦之血主濡之又云陽氣者精則養神柔則養筋陰陽既衰筋脈失其濡養而強直不柔也此痙病標本虛實之辨也病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也痙病不離乎表故身熱惡寒痙為風強病而筋脈受之故口噤頭項強背反張脈強直經云諸暴強直皆屬於風也頭熱足寒面目赤頭動搖者風為陽邪其氣上行而又主動也按以上五條王叔和本編入痙濕暍篇中在三百九十七法之外茲特録之所以廣類病之法也以下二條系太陽原文而實為痙病故移置此篇以資辨證非好為變亂前文也學者辨諸太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之太陽病項背強𠘧𠘧無汗惡風葛根湯主之二條本是痙證而有表虛表實之分表實者無汗表虛者汗反自出即所謂剛痙柔痙也然痙筋病也亦風病也故雖有剛柔之異而其項背強𠘧𠘧惡風則一也𠘧𠘧項強連背不能展顧之貌桂枝加葛根湯如太陽桂枝湯例葛根湯如太陽麻黃湯例而並加葛根者以項背𠘧𠘧筋骨肌肉並痹而不用故加葛根以疏肌肉之邪且並須桂芍薑棗以通營衛之氣桂枝加葛根湯方葛根四兩桂枝二兩去皮芍藥二兩甘草二兩生薑三兩切大棗十二枚上六味以水一斗先煮葛根減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝湯法原方有麻黃三兩成氏云麻黃主表實後葛根湯證云太陽病項背強几几無汗惡風葛根湯主之藥性正與此方同其無汗者當用麻黃今自汗出恐不加麻黃但加葛根也葛根湯方見正治法下濕病五條太陽病關節疼痛而煩脈沉而細者此名濕痹其候小便不利大便反快但當利其小便濕為六淫之一故其感人亦如風寒之先在太陽但風寒傷於肌腠而濕則流入關節風脈浮寒脈緊而濕脈則沉而細濕性濡滯而氣重著故名濕痹痹者閉也然中風者必先有內風而後召外風中濕者亦必先有內濕而後感外濕由其人平日土德不及而濕動於中由是氣化不速而濕侵於外外內合邪為關節疼痛為小便不利大便反快治之者必先逐內濕而後可以除外濕故當利其小便東垣亦云治濕不利小便非其治也濕家之為病一身盡疼發熱身色如熏黃濕外盛者其陽必內郁濕外盛為身疼陽內鬱則發熱熱與濕合交蒸互郁則身色如熏黃熏黃者如煙之熏色黃而晦濕氣沉滯故也若熱黃則黃而明所謂身黃如橘子色也濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利舌上如苔者以丹田有熱胸上有寒渴欲得水而不能飲則口燥煩也寒濕居表陽氣不得外通而但上越為頭汗出為背強欲得被覆向火是宜用溫藥以通陽不可與攻法以逐濕乃反下之則陽更被抑而噦乃作矣或上焦之陽不布而胸中滿或下焦之陽不化而小便不利隨其所傷之處而為病也舌上如苔者本非胃熱而舌上津液燥聚如苔之狀實非苔也蓋下後陽氣反陷於下而寒濕仍聚於上於是丹田有熱而渴欲得水胸上有寒而復不能飲則口舌燥煩而津液乃聚耳濕家下之額上汗出微喘小便利者死若下利不止者亦死濕病在表者宜汗在裡者宜利小便苟非濕熱蘊積成實未可遽用下法額汗出微喘陽已離而上行小便利下利不止陰復決而下走陰陽離決故死一作小便不利者死謂陽上浮而陰不下濟也亦通濕家病身疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈寒濕在上則清陽不布身疼頭痛鼻塞者濕上盛也發熱面黃煩喘者陽被郁也而脈大則非沉細之比腹和無病則非小便不利大便反快之比是其病不在腹中而在頭療之者宜但治其頭而無犯其腹內藥鼻中如瓜蒂散之屬使黃水出則寒濕去而愈不必服藥以傷其中也風濕四條病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也一身盡疼發熱者濕也日晡所劇者風也蓋濕無來去而風有休作故疼痛發熱每至日晡則劇也成氏曰若汗出當風而得之者則先客濕而後感風若久傷取冷所致者則先感風而後客濕風與濕合故曰此名風濕問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也風濕雖併為六淫之一然風無形而濕有形風氣迅而濕氣滯值此雨淫濕勝之時自有風易卻而濕難驅之勢而又發之速而驅之過宜其風去而濕不與俱去也故欲濕之去者但使陽氣內蒸而不驟泄肌肉關節之間充滿流行而濕邪自無地可容矣此發其汗但微微似欲汗出之旨歟以上七條亦從王叔和痙濕暍篇中録出非太陽原文也傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之傷寒至八九日之久而身疼不除至不能轉側知不獨寒淫為患乃風與濕相合而成疾也不嘔不渴里無熱也脈浮虛而澀風濕外持而衛陽不振也故於桂枝湯去芍藥之酸寒加附子之辛溫以振陽氣而敵陰邪若大便硬小便自利知其人在表之陽雖弱而在裡之氣自治則皮中之濕所當驅之於里使從水道而出不必更出之表以危久弱之陽矣故於前方去桂枝之辛散加白朮之苦燥合附子之大力健行者於以並走皮中而逐水氣此避虛就實之法也桂枝附子湯方桂枝四兩去皮生薑二兩切大棗十二枚擘甘草二兩炙附子三枚炮去皮破八片上五味以水六升煮取二升去滓分溫三服風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之此亦濕勝陽微之證其治亦不出助陽驅濕如上條之法也蓋風濕在表本當從汗而解而汗出表虛者不宜重發其汗惡風不欲去衣衛虛陽弱之徵故以桂枝附子助陽氣白朮甘草崇土氣云得微汗則解者非正發汗也陽勝而陰自解耳甘草附子湯方甘草二兩炙附子二枚炮去皮破白朮二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗而解能食汗出復煩者服五合多者宜服六七合為妙暍病三條太陽中暍者發熱惡寒身重而疼痛其脈弦細而遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚中暍即中暑暑亦六淫太陽受之則為寒熱也然暑陽邪也乃其證反身重疼痛脈反弦細而遲者雖名中暍而實兼濕邪也小便已灑灑毛聳者太陽主表內合膀胱便已而氣餒也手足逆冷者陽內聚而不外達故小有勞即氣出而身熱也口開前板齒燥者熱盛於內而氣淫於外也蓋暑雖陽邪而氣恆與濕相合陽求陰之義也暑因濕入而暑反居濕之中陰包陽之象也治之者一如分解風濕之法辛以散濕寒以清暑可矣若發汗則徒傷其表溫針則更益其熱下之則熱且內陷變證隨出皆非正治暑濕之法也太陽中熱者暍是也汗出惡寒身熱而渴也中熱亦即中暑暍即暑之氣也惡寒者熱氣入則皮膚緩腠理開開則灑灑然寒與傷寒惡寒者不同汗出發熱而渴知其表裡熱熾胃陰待涸求救於水乃中暑而無濕者之證也太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也暑之中人也陰虛而多火者暑即寓於火之中為汗出而煩渴陽虛而多濕者暑即伏於濕之內為身熱而疼重故暑病恆以濕為病而治濕即所以治暑故金匱以一物瓜蒂去身面四肢之水水去而暑無所依將不治而自解此中暑兼濕之證也霍亂十一條問曰病有霍亂者何答曰嘔吐而利名曰霍亂此設為問答以明霍亂之病謂邪在上者多吐邪在下者多利邪邪中焦上逆為嘔吐復下注而利者則為霍亂霍亂揮霍撩亂成於頃刻變動不安而其發熱惡寒亦與陽明相類也問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也此即上條之意而詳言之蓋霍亂之病本自外來以其人中氣不足邪得乘虛入里傷於脾胃而作吐利所以有發熱頭痛身疼惡寒之證或邪氣直侵脾胃先自吐下逮利止里和則邪氣復還之表而為發熱今人吐利之後往往發熱煩渴者是也傷寒脈微而澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必硬十三日愈所以然者經盡故也脈微為少氣澀為無血傷寒脈不應微澀而反微澀者以其為霍亂吐下之後也本是霍亂今是傷寒者吐下止而復更發熱如上條所云也熱則邪還於表當從陽而解矣乃四五日至陰經上轉入陰必利者邪氣不從陽而解而復入陰為利也夫霍亂之時既嘔且利裡氣已傷今邪轉入里而復作利則裡氣再傷故不可治若欲大便而反失氣仍不利者胃氣復而成實邪氣衰而欲退也故可期之十三日愈所以然者十二日經氣再周大邪自解更過一日病必愈耳下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也下利後便硬者病後太陰而轉屬陽明也陽明病能食者為胃和不能食者為胃未和是以下利後便硬而能食者愈或始先不能食繼復轉而能食者過於前一日亦愈其不愈者則病不屬陽明雖能食不得為胃和故病不愈也惡寒脈微而利利止亡血也四逆加人參湯主之惡寒脈緊者寒邪在外也惡寒脈微者陽虛而陰勝也則其利為陰寒而非陽熱其止亦非邪盡而為亡血矣故當與四逆以溫里加人參以補虛益血也按此條本非霍亂證仲景以為霍亂之後多有裡虛不足而當溫養者故特隸於此歟四逆加人參湯方於四逆湯方內加人參一兩余依四逆湯法服霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之霍亂該吐下而言頭痛發熱身疼痛則霍亂之表證也而有熱多寒多之分以中焦為陰陽之交故或從陽而多熱或從陰而多寒也熱多則渴欲飲水故與五苓散去水而泄熱寒多則不能勝水而不欲飲故與理中丸燠土以勝水理中丸方人參三兩甘草三兩白朮三兩乾薑三兩上四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸碎研溫服之日三夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服加減法若臍上築者腎氣動也去朮加桂四兩臍上築者臍上築築然跳動腎氣上而之脾也脾方受氣術之甘能壅脾氣故去之桂之辛能下腎氣故加之吐多者去朮加生薑三兩吐多者氣方上壅甘能壅氣故去朮辛能散氣故加生薑下多者還用術悸者加伏苓二兩下多者脾氣不守故須術以固之悸者腎水上逆故加茯苓以導之渴欲得水者加朮足前成四兩半渴欲得水者津液不足白朮之甘足以生之腹中痛者加人參足前成四兩半腹中痛者裡虛不足人參之甘足以補之寒者加乾薑足前成四兩半寒者腹中氣寒也乾薑之辛足以溫之腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被腹滿者氣滯不行也氣得甘則壅得辛則行故去朮加附子吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止里已和也身痛不休者表未解也故須桂枝和解其外所謂表病里和汗之則愈也曰消息曰小和之者以吐利之餘裡氣已傷故必消息其可汗而後汗之亦不可大汗而可小和之也吐利汗出發熱惡寒四肢拘急手足厥逆者四逆湯主之此陽虛霍亂之候發熱惡寒者身雖然而惡寒身熱為陽格之假象惡寒為虛冷之真諦也四肢拘急手足厥逆者陽氣衰少不柔於筋不溫於四末也故宜四逆湯助陽氣而驅陰氣既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之此亦虛冷霍亂之候四肢拘急手足厥逆虛冷之著於外者也下利清穀脈微欲絶虛冷之著於裡者也而其為霍亂則一故吐利汗出內寒外熱與上條同而其用四逆驅內勝之陰復外散之陽亦無不同也吐已下斷汗出而厥四肢拘急脈微欲絶者通脈四逆加豬膽汁湯主之吐下已止陽氣當復陰邪當解乃汗出而厥四肢拘急而又脈微欲絶則陰無退散之期陽有散亡之象於法為較危矣故於四逆加乾薑一倍以救欲絶之陽而又慮溫熱之過反為陰氣所拒而不入故加豬膽汁之苦寒以為嚮導之用內經盛者從之之意也四逆加豬膽汁湯方於四逆湯方內加入豬膽汁半合余依前法服如無豬膽以羊膽代之吐利發汗脈平小煩者以新虛不勝穀氣故也吐利之後發汗已而脈平者為邪已解也邪解則不當煩而小煩者此非邪氣所致以吐下後胃氣新虛不能消穀谷盛氣衰故令小煩是當和養胃氣而不可更攻邪氣者也飲證一條病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散此痰飲類傷寒證寒為寒飲非寒邪也活人云痰飲之為病能令人憎寒發熱狀類傷寒但頭不痛項不強為異正此之謂脈浮者病在膈間而非客邪故不盛而微也胸有寒飲足以阻清陽而礙肺氣故胸中痞硬氣上衝咽喉不得息也經曰其高者因而越之千金云氣浮上部頓塞心胸胸中滿者吐之則愈瓜蒂散能吐胸中與邪相結之飲也瓜蒂散方瓜蒂熬黃赤小豆各一分即糧食中蟹眼緊細之赤豆是也上二味各別搗篩為散合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與之
