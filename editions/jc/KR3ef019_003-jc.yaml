body:
  text: 卷三陽明篇上辨列陽明條例大意太陽病從外入是以經病多於腑病若陽明則腑病多於經病以經邪不能久留而腑邪常聚而不行也故仲師以胃家實為陽明正病本篇先列腑病於前次列經病於後遵先聖之法也而經病有傳經自受之不同腑病有宜下宜清宜溫之各異詳見各條要皆不出為正治之法也此為上篇凡四十九條其次則為明辨法蓋陽明以胃實為病之正以攻下為法之的而其間有經腑相連虛實交錯或可下或不可下或可下而尚未可下及不可大下之時故有脈實潮熱轉失氣小便少等辨及外導潤下等法又其次為雜治法謂病變發黃蓄血諸候非復陽明胃實及經邪留滯之時所可比例或散或下所當各隨其證而異其治者也此為下篇凡三十三條陽明正治法第一陽明腑病證十二條陽明之為病胃家實也胃者匯也水穀之海為陽明之腑也胃家實者邪熱入胃與糟粕相結而成實非胃氣自盛也凡傷寒腹滿便閉潮熱轉失氣手足濈濈汗出等證皆是陽明胃實之證也問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也太陽陽明者病在太陽而兼陽明內實以其人胃陽素盛脾陰不布屎小而硬病成脾約於是太陽方受邪氣而陽明已成內實也正陽陽明者邪熱入胃糟粕內結為陽明自病活人所謂病人本谷盛氣實是也少陽陽明者病從少陽而轉屬陽明得之發汗利小便津液去而胃燥實如本論所謂傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯是也此因陽明之病有是三者之異故設為問答以明之而其為胃家實則一也問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也經邪未變故惡寒入腑則變熱而不寒經邪不能聚故傳入腑則聚而不傳曰萬物所歸者謂邪氣離經入腑聚而不行如萬物之歸於土也是以惡寒為傷寒在表之的證惡熱為陽明入腑之的證始雖惡寒不久即止豈若太陽始終有寒者哉此三條並論陽明受病之證也問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也胃者津液之腑也汗下利小便津液外亡胃中乾燥此時寒邪已變為熱熱猶火也火必就燥所以邪氣轉屬陽明也而太陽轉屬陽明其端有二太陽初得病時發其汗汗先出不徹因轉屬陽明者為邪氣未盡而傳其病在經此太陽病若汗若下若利小便亡津液胃中乾燥因轉屬陽明者為邪氣變熱而傳其病在腑也此陽明受病之因也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語脈沉病在裡也喘滿因滿而為喘病之實也傷寒四五日病在裡而成實法當攻裡而反發其汗津液外亡腸胃內燥大便為難所必然矣表虛里實亦即表和里病之意久則譫語者熱氣乘虛必歸陽明而成胃實也脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過太過為陽絕於里亡津液大便因硬也脈陽微者諸陽脈微即正之虛也故汗出少者邪適去而正不傷為自和汗出多者邪雖卻而正亦衰為太過也陽脈實者邪之實也然發其汗出多者亦為太過為其津亡於外而陽絕於里也夫陽為津液之源津液為陽之根汗出過多津液竭矣陽氣雖存根本則離故曰陽絕陽絕津亡大便焉得不硬耶脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絕脈浮為盛於外脈芤為歉於內浮為陽謂陽獨盛也芤為陰調陰不足也浮芤相搏陽有餘而陰不足也胃液枯竭內虛生熱雖有陽氣無與為偶亦如上條之意也故曰其陽則絕以上三條乃因陽明受病之因而申言之其下三條則申言陽明受病之證也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也傷寒轉系陽明者其人濈濈然微汗出也發熱無汗為太陽病在表嘔不能食者邪欲入里而正氣拒之也至汗出濈濈則太陽之邪陽明已受之矣故曰轉系陽明太陽寒在皮毛腠理閉塞故無汗陽明熱在肌肉腠開液泄故濈濈然汗自出也病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也熱結陽明為不大便五六日為繞臍痛煩躁發作有時皆燥屎在胃之徵有時謂陽明王時為日晡也陽明燥結不得大便意非大承氣不為功矣調胃承氣湯證四條太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之發汗不解邪不外散而欲內傳為太陽而之陽明之候也蒸蒸發熱者熱聚於內而氣蒸於外與太陽邪鬱於外而熱盛於表者不同故彼宜外解此宜清裡也然無燥實等證則所以治之者宜緩而不宜急矣調胃者調其胃氣返於中和不使熱盛氣實而劫奪津氣也調胃承氣湯方見太陽權變法傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之此亦邪氣去太陽而之陽明之證過經者邪氣去此而之彼之謂非必十三日不解而後謂之過經也觀少陽篇第二十條云太陽病過經十餘日又本篇第六十一條云此為風也須下之過經乃可下之則是太陽病罷而入陽明或傳少陽者即謂之過經其未罷者即謂之並病耳譫語胃有熱也則熱當以湯下之若小便利者津液偏滲其大便必硬而反下利脈調和者醫知宜下而不達宜湯之旨故以丸藥下之非其治也脈微厥脈乍不至也言自下利者裡氣不守脈當微厥今反和者以其內實雖下利而胃有燥屎本屬可下之候也故當以調胃承氣湯下其內熱此條太陽篇移入陽明病不吐不下心煩者可與調胃承氣湯病在陽明既不上湧又不下泄而心煩者邪氣在中土鬱而成熱也經曰土鬱則奪之調胃承氣蓋以通土氣非以下燥屎也傷寒吐後腹脹滿者與調胃承氣湯吐後腹脹滿者邪氣不從吐而外散反因吐而內陷也然脹形已具自必攻之使去而吐後氣傷又不可以大下故亦宜大黃甘草芒硝調之俾反於利而已設遇庸工見其脹滿必以枳樸為急矣小承氣湯證二條太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈若與或同病在太陽或吐或下或汗邪仍不解而兼微煩邪氣不之表而之裡也小便數大便因硬者熱氣不之太陽之本而之陽明之腑可與小承氣和胃除熱為主不取大下者以津液先亡不欲更傷其陰耳小承氣湯方大黃四兩厚朴二兩去皮炙枳實三枚炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服汗生於津液津液資於穀氣故陽明多汗則津液外出也津液出於陽明而陽明亦藉養於津液故陽明多汗則胃中無液而燥也胃燥則大便硬大便硬則譫語是宜小承氣湯以和胃而去實若一服譫語止更莫復服者以津液先亡不欲多下以竭其陰亦如上條之意也大承氣湯證九條陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯下之傷寒胃熱而虛者能食胃寒而實者則不能食而陽明病有燥屎者可攻無燥屎者則不可攻譫語潮熱胃之熱也是當能食而反不能食者中有燥屎氣窒而不行法當大承氣下之者也若能食者屎未成燥而但硬耳設欲攻之則必以小承氣和之如上二條所云而已本文宜大承氣湯下之七字當在胃中有燥屎句下大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝二合上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上微火一兩沸分溫再服得下余勿服病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯小便不利者其大便必溏而有燥屎者水液雖還入胃猶不足以潤之故大便乍有難時而亦乍有易時也若時有微熱喘冒不得臥則熱氣外攻內擾而復上逆知其聚於中者盛也故曰有燥屎也大便雖有易時亦必以大承氣為主矣大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯大下之後胃氣復實煩滿復增者以其人本有宿食未去邪氣復得而據之也不然下後胃虛豈得更與大下哉蓋陽明病實則邪易聚而不傳虛則邪不得聚而傳是以雖發潮熱而大便溏者邪氣轉屬少陽為胸脅滿不去雖經大下而有宿食者邪氣復集胃中為不大便煩滿腹痛有燥屎而彼與小柴胡此宜大承氣一和一下天然不易之法也小柴胡證見本篇四十一條宜互參傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服吐下之後邪氣不從外解而仍內結熱入胃腑聚而成實致不大便五六日或十餘日也陽明內實則日晡所發潮熱蓋申酉為陽明王時而日晡為申酉時也表和里病則不惡寒傷寒以惡熱為里而惡寒為表也熱氣熏心則獨語如見鬼狀蓋神藏於心而陽明之絡通於心也若熱甚而劇者發則不識人循衣摸床惕而不安微喘直視是不特邪盛而正亦衰矣若脈弦則陰未絕而猶可治脈澀則陰已絕而不可治所謂傷寒陽勝而陰絕者死也其熱微而未至於劇者則但發熱譫語不大便而已是可以大承氣下之而愈也一服利止後服者以熱未至劇故不可過下以傷其正耳二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯此太陽並於陽明之證然並病有並而未罷之證雖入陽明未離太陽則可汗而不可下如本篇第三十九條之證是也此條為並而已罷之證雖曰並病實為陽明故可下而不可汗潮熱手足漐漐汗出大便難譫語皆胃實之徵故曰下之則愈宜大承氣湯陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明少陽合病視太陽陽明合病為尤深矣故必下利而陽明為土少陽為木於法又有互相剋賊之機故須審其脈不負者為順其有負者為失也負者少陽王而陽明衰謂木勝乘土也若脈滑而數則陽明王而少陽負以有宿食在胃故邪氣得歸陽明而成可下之證不然胃虛風動其下利寧有止期耶傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯目中不了了者目光不精而視物不明也睛不和者目直視而不圓轉也六七日熱盛而陰傷故其證如此無表裡證無頭痛惡寒而又無腹滿譫語等證也然而大便難身微熱則實證已具合之目中不了了睛不和其為熱極陰傷無疑故雖無大滿大實亦必以大承氣湯急下見稍遲則陰竭不復而死耳陽明病發熱汗多者急下之宜大承氣湯發熱汗多者熱盛於內而津迫於外也不下則熱不除不除則汗不止而陰乃亡矣故宜急下然必有實滿之證而後可下不然則是陽明白虎湯證宜清而不宜下矣學者辨諸發汗不解腹滿痛者急下之宜大承氣湯發汗不解腹滿痛者病去表之裡而盛於裡矣夫正氣與邪氣相擊則痛治之者如救斗然遲則正被傷矣故亦宜急下以上下法共十五條然其間或曰和或曰下或曰急下或一服利止後服各隨病之大小緩急而異其治學者所當明辨也合論三承氣湯方承者順也順而承者地之道也故天居地上而常卑而下行地處天下而常順承乎天人之脾胃猶地之上也乃邪熱入之與糟粕結於是燥而不潤剛而不柔滯而不行而失其地之道矣豈復能承天之氣哉大黃芒硝枳樸之屬滌盪脾胃使糟粕一行則熱邪畢出地道既平天氣乃降清寧復舊矣曰大曰小曰調胃則各因其制而異其名耳蓋以硝黃之潤下而益以枳樸之推逐則其力頗猛故曰大其無芒硝而但有枳樸者則下趨之勢緩故曰小其去枳樸之苦辛而加甘草之甘緩則其力尤緩但取和調胃氣使歸於平而已故曰調胃白虎加人參湯證三條傷寒病若吐若下後六七日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之以下三條王叔和本在太陽篇中今移置此傷寒若下若吐後至七八日不解而燥渴轉增者邪氣去太陽之經而入陽明之腑也陽明經為表而腑為里故曰熱結在裡腑中之熱自內際外為表裡俱熱熱盛於內陰反居外為時時惡風而胃者津液之原也熱盛而涸則舌上乾燥故既以白虎除熱必加人參以生津尚從善所謂邪熱結而為實者則無大渴邪氣散漫熏蒸焦膈故舌上乾燥而煩大渴欲飲水數升是也是以白虎承氣併為陽明腑病之方而承氣苦寒逐熱蕩實為熱而且實者設白虎甘寒逐熱生津為熱而不實者設乃陽明邪熱入腑之兩大法門也故從太陽分出三條並列於此云白虎加人參湯方見太陽斡旋法傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之無大熱表無大熱也口燥渴心煩裡熱極盛也背微惡寒與時時惡風同意蓋亦太陽經邪傳入陽明胃腑熏蒸焦膈之證故宜白虎加人參以徹熱而生津也傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之前二條既著白虎之用此條復示白虎之戒謂邪氣雖入陽明之腑而脈證猶帶太陽之經者則不可便與白虎湯與之則適以留表邪而傷胃氣也而又申之曰渴欲飲水無表證者白虎加人參湯主之其丁寧反復之意可謂至矣陽明經病脈因證治十一條傷寒三日陽明脈大邪氣並於太陽則浮並於陽明則大云三日者舉傳經次第之大凡也又陽明之脈人迎趺陽皆是傷寒三日邪入陽明則是二脈當大不得獨診於右手之附上也本太陽病初得時發其汗汗先出不徹因轉屬陽明也徹達也汗雖欲出而不達於皮膚則邪不外出而反內入此太陽之邪傳陽明之經與汗下後入腑者不同也陽明病脈浮而緊者必潮熱發作有時但浮者必盜汗出太陽脈緊為寒在表陽明脈緊為實在裡裡實則潮熱發作有時也若脈但浮而不緊者為里未實而經有熱經熱則盜汗出蓋雜病盜汗為熱在臟外感盜汗為邪在經易簡方用防風治盜汗不止此之謂也陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛苦不咳不嘔手足不厥者頭不痛無汗而小便利邪不外散而氣但下趨也二三日嘔而咳者邪復從上行也手足厥者氣仍不外達也故必苦頭痛所以然者下趨而極勢必上行外達無由上攻必猛也若不咳不嘔則氣且下行手足不厥則氣得四達何至上逆而頭痛哉讀此可以知陽明邪氣上下進退之機陽明病口燥但欲漱水不欲咽者此必衄陽明口燥欲飲水者熱在氣而屬腑口燥但欲漱水不欲咽者熱在血而屬經經中熱甚血被熱迫必妄行為衄也脈浮發熱口乾鼻燥能食者則衄脈浮發熱口乾鼻燥亦熱邪壅盛於經之證能食者風多熱迫安得不勝陰血被衄耶陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明病脈浮無汗而喘者發汗則愈宜麻黃湯此二條乃風寒初中陽明之證其見證與太陽中風傷寒相類而陽明比太陽稍深故中風之脈不浮而遲傷寒之脈不緊而浮以風寒之氣入肌肉之分則閉固之力少而壅遏之力多也而其治法則必與太陽少異見有汗而惡寒者必桂枝可解無汗而喘者非麻黃不發矣二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也此篇從太陽篇移入二陽並病者太陽病未罷而並於陽明也太陽得病時發汗不徹則邪氣不得外出而反內走陽明此並之由也續自微汗出不惡寒此陽明證續見乃並之證也若太陽證不罷者不可下下之為逆所謂本當發汗而反下之此為逆是也如是者可小發汗以病兼陽明故不可大汗而可小發此並病之治也若發其小汗已面色緣緣正赤者陽氣怫鬱在表而不得越散當解之熏之以助其散又並病之治也發汗不徹下疑脫一徹字謂發汗不徹雖徹而不足云徹猶腹滿不減減不足言之文汗出不徹則陽氣怫鬱不得越陽不得越則當汗而不得汗於是邪無從出攻走無常其人躁煩不知痛處乍在腹中乍在四肢按之而不可得也短氣者表不得泄肺氣不宣也坐猶緣也言躁煩短氣等證但緣汗出不徹所致故當更發其汗則邪氣外達而愈非特熏解所能已其疾矣以面色緣緣正赤者邪氣怫鬱軀殼之表躁煩短氣者邪氣怫鬱軀殼之裡也按內經云脈滑者多汗又曰脈澀者陰氣少陽氣多也夫汗出於陽而生於陰因診其脈澀而知其汗出不徹也此又並病之治也陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之潮熱者胃實也胃實則大便硬乃大便溏小便自可胸脅滿不去知其邪不在於陽明之腑而入於少陽之經由胃實而腸虛是以邪不得聚而復傳也是宜小柴胡以解少陽邪氣陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也此亦陽明傳入少陽之證脅下硬滿而嘔舌上苔白皆少陽經病見證雖不大便不可攻之亦宜小柴胡和解少陽邪氣而已夫脅下滿痛而嘔則邪方上壅而津液不得下行與小柴胡和散其邪則上焦得通而脅不滿硬矣津液得下而嘔不作矣氣通津下胃氣因和便從里出汗從表出而邪自渙然冰釋矣是以胃中硬滿不大便而無少陽證者可攻其有少陽證者雖不大便亦不可攻而可和也陽明病風寒不同證治八條陽明病若能食名中風不能食名中寒陽明腑病有傳經自受之異傳經者風寒已變其病多熱自受者風寒初入其病多冷而風之與寒則又有辨此條蓋陽明胃腑自中風寒之辨也太陽主肌表故有有汗無汗之分陽明為胃府故有能食不能食之辨風為陽而寒為陰陽能消穀而陰不能消穀之意也夫風寒中人無有常經是以傷寒不必定自太陽中寒不必定自三陰論中凡言陽明中風陽明病若中寒及少陽中風太陰少陰厥陰中風等語皆是本經自受風寒之證非從太陽傳來者也學者辨諸陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也手足濈然汗出於法為胃家實而寒邪適中小便復不利則是胃有堅積而水寒勝之所以知其欲作固瘕固瘕者胃寒成聚久泄不已也以下四條並陽明胃府自中寒邪之證脈浮而遲表熱裡寒下利清穀者四逆湯主之若胃中虛冷不能食與水則噦脈遲為寒而病系陽明則脈不沉而浮也寒中於里故下利清穀而陽為陰迫則其表反熱也四逆湯為復陽散寒之劑故得主之而陽明土也土惡水而喜溫若胃虛且冷不能納穀者土氣無權必不能勝水而禁冷設與之水水與寒搏必發為噦噦呃逆也食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也食谷欲嘔有中焦與上焦之別蓋中焦多虛寒而上焦多火逆也陽明中虛客寒乘之食谷則嘔故宜吳茱萸湯以益虛而溫胃若得湯反劇則仍是上焦火逆之病宜清降而不宜溫養者矣仲景於疑似之間細心推測如此吳茱萸湯方吳茱萸一斤洗人參三兩生薑六兩切大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也口苦咽乾陽邪內侵也腹滿微喘裡氣不行也發熱惡寒表邪方盛也夫邪在裡者已實而在表者猶盛於法則不可下下之則邪氣盡陷脾乃不化腹加滿而小便難矣此陽明自中風邪而表裡俱受之證是以脈浮而緊蓋太陽脈緊為表有寒陽明脈緊為里有實前第三十三條云陽明病脈浮而緊者必潮熱發作有時意可參考陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治此條雖系陽明而已兼少陽雖名中風而實為表實乃陽明少陽邪氣閉鬱於經之證也陽明閉郁故短氣腹滿鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱少陽閉郁故脅下及心痛久按之氣不通時時噦耳前後腫刺之小瘥外不解者脈證少平而大邪不去也病過十日而脈續浮知其邪猶在經故與小柴胡和解邪氣若脈但浮而無少陽證兼見者則但與麻黃湯發散邪氣而已蓋以其病兼少陽故不與葛根而與柴胡以其氣實無汗故雖中風而亦用麻黃若不得尿故腹加滿噦加甚者正氣不化而邪氣獨盛雖欲攻之神不為使亦無益矣故曰不治陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛但頭眩不惡寒能食而咳者陽明風邪變熱聚於胃而逆於肺也咽居肺上故必咽痛若不咳者肺不受熱則咽必不痛不惡寒而頭眩者氣方外淫而不內熾亦何至能食而咳哉陽明病能食小便反不利大便自調其人骨節疼翕然如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈此陽明風濕為痹之證金匱云濕痹之候小便不利大便反快又濕病關節疼痛而煩是也奄然發狂者胃中陽勝所謂怒狂生於陽也濈然汗出者穀氣內盛所為汗出於谷也穀氣盛而水濕不能勝之則隨汗外出故曰與汗共並汗出邪解脈氣自和故曰脈緊則愈前第四十三條中寒不能食所以雖有堅積而病成固瘕此條胃強飲食所以雖有水濕而忽從汗散合而觀之可以知陰陽進退之機
