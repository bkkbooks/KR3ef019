body:
  text: 卷六太陰篇辨列太陰條例大意太陰者土也在臟為脾在氣為濕傷寒傳經之熱入而與之相摶則為腹滿吐利等證直中之寒入而與濕相摶亦為腹滿吐利等證但有肢冷肢溫脈遲脈數口渴不渴之異耳又三陰為三陽之裡而三陰亦自有表裡是以風寒所中不必盡入於臟而亦留連於經故有太陰中風之條與桂枝發汗之法又下利腹脹滿身體疼痛者此為經臟俱病之證故與先里後表之法乃今之論三陰者但云直中傳經而已是知有三陰之裡不知有三陰之表也茲篇先列臟病次列經病又次為經臟俱病凡十條為一卷太陰諸法太陰臟病脈證治六條太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬此足太陰病之的證也太陰之脈入腹屬脾絡胃上膈挾咽故其病有腹滿而吐食不下自利腹痛等證然太陰為病不特傳經如是即直中亦如是且不特傷寒如是即雜病亦如是但有屬陰屬陽為盛為虛之分耳而太陰者臟也滿而不實法不可下若下之則胸下結硬中氣傷者邪氣必結也本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之病在太陽不與解表而反攻裡因而邪氣乘虛陷入太陰之位為腹滿而時痛陶氏所謂誤下傳者是也夫病因邪陷而來者必得邪解而後愈而臟陰為藥所傷者亦必以藥和之而後安故須桂枝加芍藥湯主之桂枝所以越外入之邪芍藥所以安傷下之陰也按金匱云傷寒陽脈澀陰脈弦法當腹中急痛者與小建中湯不瘥者與小柴胡湯此亦邪陷陰中之故而桂枝加芍藥亦小建中之意不用膠飴者以其腹滿不欲更以甘味增滿耳桂枝加芍藥湯方於桂枝湯方內更加芍藥三兩隨前共六兩余依桂枝湯法大實痛者桂枝加大黃湯主之此承上條而言腹滿而未實痛而不甚者可以桂枝加芍藥和而解之若大實大痛者邪氣成聚必以桂枝加大黃越陷邪而去實滯也夫太陰脾臟也臟何以能實而可下陽明者太陰之表以膜相連臟受邪而腑不行則實故脾非自實也因胃實而實也大黃所以下胃豈以下脾哉少陰厥陰亦有用承氣法詳見各篇所當互考桂枝加大黃湯方桂枝三兩去皮甘草三兩炙大黃一兩生薑三兩切大棗十二枚芍藥六兩上六味以水七升煮取三升去滓溫服一升日三服太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也此亦承上條而言大黃芍藥之得以用者為其胃實而便堅也若其人脈弱續自便利則雖有大實痛證此法不可用矣即欲用之亦宜量減而與之所以然者胃氣弱而不振邪氣不聚而易動故可以緩圖而難以峻攻也傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日暴煩下利日十餘行必自止以脾家實穢腐當去故也傷寒脈浮而緩者脈緊去而成緩為寒欲變熱之證如太陽第四十七條之例也手足自溫非太陰定證見太陰有寒手足必寒有熱手足乃自溫耳又陽明受熱即一身及手足熱太陰則身不熱而手足溫茲寒已變熱而手足自溫則傷寒之邪不之陽明而之太陰而其脈仍浮則其邪亦未盡入故曰系在太陰謂以太陽而內連太陰也於法太陰受熱而汗不出者熱與濕摶當發身黃若小便自利者其熱得通不能蒸郁為黃矣至七八日暴煩下利者正氣內作邪氣欲去也雖日十餘行繼必自止所以然者脾家本有穢腐當去故為自利穢腐盡則利亦必自止矣自利不渴者屬太陰以其臟有寒故也當溫之宜四逆輩自利不渴者太陰本自有寒而陰邪又中之也曰屬太陰其臟有寒明非陽經下利及傳經熱病之比法當溫臟祛寒如四逆湯之類不可更以苦寒堅之清之如黃芩湯之例也太陰經病證治二條太陰中風四肢煩疼陽微陰澀而長者為欲愈此太陰自中風邪之證不從陽經來也夫太陰脾也風陽邪也脾主行氣於四肢而風淫為末病故太陰中風四肢煩熱而疼痛也脈陽微陰澀而長者陽無病而陰受邪而澀又為邪氣之將衰長為正氣之方盛正盛邪衰故為欲愈太陰病脈浮者可發汗宜桂枝湯太陰脈浮有二義或風邪中於太陰之經其脈則浮或從陽經傳入太陰旋覆反而之陽者其脈亦浮浮者病在經也凡陰病在臟者宜溫在經者則宜汗如少陰之麻黃附子細辛厥陰之麻黃升麻皆是也桂枝湯甘辛入陰故亦能發散太陰之邪太陰經臟俱病一條下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此條叔和本列厥陰篇中今移置此此太陰經臟並受寒邪之證叔和編入厥陰經中者誤也下利腹脹滿里有寒也身體疼痛表有寒也然必先溫其里而後攻其表所以然者臟氣不充則外攻無力陽氣外泄則裡寒轉增自然之勢也而四逆用生附則寓發散於溫補之中桂枝有甘芍則兼固里於散邪之內用法之精如此太陰病愈期一條太陰病欲解時從亥至醜上六經邪解之時必於其經王之時太陰者土也土王於辰戌丑未而獨於亥子丑時解者脾為陰土應王於陰故其病欲解必從亥至醜上也
