body:
  text: 卷一太陽篇上辨列太陽條例大意傷寒一證古稱大病而太陽一經其頭緒之繁多方法之龐雜又甚於他經是以辨之非易然非不可辨也蓋太陽之經其原出之病與正治之法不過二十餘條而已其他則皆權變法斡旋法救逆法類病法也假使治傷寒者審其脈之或緩或急辨其證之有汗無汗則從而汗之解之如桂枝麻黃等法則邪卻而病解矣其或合陽明或合少陽或兼三陽者則從而解之清之如葛根黃芩白虎等法亦邪分而病解矣此為正治之法顧人氣體有虛實之殊臟腑有陰陽之異或素有痰飲痞氣以及咽燥淋瘡汗衄之疾或適當房室金刃產後亡血之餘是雖同為傷寒之候不得竟從麻桂之法矣於是乎有小建中炙甘草大小青龍及桂枝二麻黃一等湯也是為權變之法而用桂枝麻黃等法又不能必其無過與不及之弊或汗出不徹而邪不外散則有傳變他經及發黃蓄血之病或汗出過多而並傷陽氣則有振振擗地肉瞤筋惕等證於是乎有可更發汗更藥發汗及真武四逆等法也是為斡旋之法且也醫學久蕪方法罕熟或當汗而反下或既下而復汗以及溫針艾灼水潠種種混施以致結胸痞滿挾熱下利或煩躁不得眠或內煩飢不欲食或驚狂不安或肉上粟起於是乎有大小陷胸諸瀉心湯文蛤散等方也此為救逆之法至於天之邪氣共有六淫太陽受邪亦非一種是以傷寒之外又有風溫溫病風濕中濕濕溫中暍霍亂等證其形與傷寒相似其治與傷寒不同於是乎有桂附朮附麻黃白朮瓜蒂人參白虎等方此為傷寒類病法也夫振裘者必挈其領整綱者必提其綱不知出此而徒事區別縱極清楚亦何適於用哉茲略引大端於前分列綱目於後而仲景之方與法罔不備舉然後太陽一經千頭萬緒總歸一貫比於百八輪珠個個在手矣六經仿此詳見各篇太陽正治法第一太陽病脈證三條太陽之為病脈浮頭項強痛而惡寒人身十二經絡本相聯貫而各有畔界是以邪氣之中必各有所見之證與可據之脈仲景首定太陽脈證曰脈浮頭項強痛惡寒蓋太陽居三陽之表而其脈上額交巔入絡腦還出別下項故其初病無論中風傷寒其脈證皆如是也後陽明篇云陽明之為病胃家實也少陽篇云少陽之為病口苦咽乾目眩也三陰篇云太陰之為病腹滿而吐食不下自利益甚時腹自痛少陰之為病脈微細但欲寐厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蛔暨本文共六條遞舉六經受病之脈證故柯氏目為六經之綱領而此則為太陽之綱領也然陽明條下無口乾惡熱之文少陽證中無往來寒熱之目少陰欲寐僅舉一端太陰厥陰多言臟病學者當參合他條毋徒執一可也太陽病發熱汗出惡風脈緩者名為中風此太陽中風之的脈的證也太陽篇中原有傷寒中風風溫溫病中濕風濕濕溫痙暍等證仲景蓋以諸病皆有發熱皆能傳變與傷寒同其實所受之邪則不同故特列而辨之所以清傷寒之源也王叔和氏分出痙濕暍三種以為與傷寒相似宜應別論其中風風溫等病仍匯太陽篇中要之中風風溫溫病雖並得稱傷寒而其病發之狀與治之之法實與傷寒不同叔和匯列於此者又以正中風風溫溫病之始也然詳仲景篇中每多風寒互舉之處似有不容分別而出之者豈非以風寒之氣恆相兼與陰陽之致可互參耶余故以中風傷寒並列於此而風溫溫病則隸於類病法下遵先聖之旨也至於汗出脈緩之理成氏暨諸賢所謂風性解緩而衛不外固者韙矣茲不復贅太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒此太陽傷寒之的脈的證也與前中風條參之自別蓋風為陽邪寒為陰邪陽氣疾陰氣徐故中風身熱而傷寒不即熱也風性解緩寒性勁切故中風汗出脈緩而傷寒無汗脈緊也惡寒者傷於寒則惡寒猶傷於風則惡風傷於食則惡食也體痛嘔逆者寒傷於形則痛胃氣得寒則逆也然竊嘗考諸條中濕風濕併兼體痛中風中暍俱有惡寒風邪上壅多作乾嘔濕家下早亦成噦逆故論太陽傷寒者當以脈緊無汗身不即熱為主猶中風以脈緩多汗身熱為主也其惡寒體痛嘔逆則以之合證焉可耳不言無汗者以脈緊該之也此二條乃太陽病之條目也桂枝湯脈證七條太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之太陽中風者陽受風氣而未及乎陰也故其脈陽浮而陰弱陽浮者不待閉鬱而熱自發陰弱者不必攻發而汗自出所以然者風為陽邪而上行衛為陽氣而主外以陽從陽其氣必浮故熱自發陽得風而自強陰無邪而反弱以弱從強其氣必餒故汗自出嗇嗇惡寒淅淅惡風者肌腠疏緩衛氣不諧雖無寒而若不能御雖無風而常覺灑淅也翕越也動也盛也言其熱時動而盛不似傷寒之一熱至極也鼻鳴乾嘔不特風氣上壅亦邪氣暴加裡氣上爭之象是宜桂枝湯助正以逐邪抑攘外以安內也桂枝湯方桂枝三兩去皮甘草二兩炙芍藥三兩生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗重服依前法又不汗後服小促半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物按風之為氣能動陽氣而泄津液所以發熱汗自出與傷寒之發熱無汗不同此方用桂枝發散邪氣即以芍藥攝養津氣炙甘草合桂枝之辛足以攘外合芍藥之酸足以安內生薑大棗甘辛相合補益營衛亦助正氣去邪氣之用也蓋以其汗出而邪不出故不用麻黃之發表而以桂枝助陽以為表以其表病而里無熱故不用石膏之清裡而用芍藥斂陰以為里此桂枝湯之所以異於麻黃大青龍也服已須臾啜稀粥一升余所以助胃氣即所以助藥力蓋藥力必藉胃氣以行也溫覆令微汗不使流漓如水者所謂汗出少者為自和汗出多者為太過也一服汗出病瘥停後服者中病即止不使過之以傷其正也若不汗後服小促及服至二三劑者期在必克以汗出為和而止也仲景示人以法中之法如此太陽病頭痛發熱汗出惡風者桂枝湯主之太陽受邪無論中風傷寒俱有頭痛俱有發熱但傷於寒則表實無汗傷於風則表疏自汗是頭痛發熱者傷寒所同而汗出惡風者中風所獨也中風必以風劑治之云桂枝湯主之者見非他藥所得而更者耳太陽病外證未解脈浮弱者當以汗解宜桂枝湯太陽外證即頭痛發熱惡風寒之屬外證未解宜從汗解然必審其脈之強弱而施治若脈浮弱則是中風陽浮陰弱之候治宜桂枝湯助正以逐邪太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之傷寒在表者宜汗在裡者宜下此大法也是以外證未解者不可下下之是病在表而攻其里也故曰逆本論云本發汗而復下之此為逆也若先發汗治不為逆此之謂也而欲解外則桂枝成法不可易矣仲景於當汗之證隨示不可下之戒如此病常自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故耳以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯此即前條陰弱者汗自出之意而發明之謂營未病而和則汗液自通衛中風而不諧則陰氣失護宜其汗常自出也夫營與衛常相和諧者也營行脈中為衛之守衛行脈外為營之護何有發熱惡寒之證哉惟衛得風而自強營無邪而反弱邪正不同強弱異等雖欲和諧不可得矣故曰營氣和者外不諧不諧則豈特衛病而已哉故欲營之安必和其衛欲衛之和必逐其風是宜桂枝湯助陽取汗汗出則邪去而衛和衛和則營不受擾而愈病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之人之一身經絡綱維於外臟腑傳化於中而其為病從外之內者有之從內之外者有之臟無他病里無病也時發熱自汗則有時不發熱無汗可知而不愈者是其病不在裡而在表不在營而在衛矣先其時發汗則愈者於不熱無汗之時而先用藥取汗則邪去衛和而愈不然汗液方泄而復發之寧無如水淋漓之患耶太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯此即前條衛不諧營自和之意而申其說救邪風者救衛氣之為風邪所擾也然仲景營弱衛強之說不過發明所以發熱汗出之故後人不察遂有風並於衛衛實而營虛寒中於營營實而衛虛之說不知邪氣之來自皮毛而入肌肉無論中風傷寒未有不及於衛者其甚者乃並傷於營耳郭白雲所謂涉衛中營者是也是以寒之淺者僅傷於衛風而甚者並及於營衛之實者風亦難泄衛而虛者寒猶不固無汗必發其汗麻黃湯所以去表實而發邪氣有汗不可更發汗桂枝湯所以助表氣而逐邪氣學者但當分病證之有汗無汗以嚴麻黃桂枝之辨不必執營衛之孰虛孰實以證傷寒中風之殊且無汗為表實何云衛虛麻黃之去實寧獨遺衛能不膠於俗說者斯為豪傑之士桂枝湯禁三條桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也仲景既詳桂枝之用後申桂枝之禁曰桂枝本為解肌而不可用以發汗解肌者解散肌表之邪與麻黃之發汗不同故惟中風發熱脈浮緩自汗出者為宜若其人脈浮緊發熱汗不出則是太陽麻黃湯證設誤與桂枝必致汗不出而煩躁甚則斑黃狂亂無所不至矣此桂枝湯之大禁也故曰不可與也當須識此勿令誤也仲景叮嚀之意至矣若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也本草云酒性熱而善上又忌諸甜物飲酒之人甘味積中而熱氣時上故雖有桂枝證不得服桂枝湯得之則嘔以酒客不喜甘而桂枝湯味甘能增滿而致嘔亦一大禁也凡服桂枝湯吐者其後必吐膿血也凡服桂枝湯吐者不必盡是酒客此其脾胃素有濕熱蘊蓄可知桂枝湯其甘足以釀濕其溫足以助熱設誤服之而致吐其濕熱之積上攻肺中與表之邪風相得蒸郁不解發為肺癰咳吐膿血勢有必至者矣仲景因酒客復申其說如此麻黃湯脈證七條太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之足之太陽其脈上際巔頂而下連腰足而寒之為氣足以外閉衛陽而內郁營血故其為病有頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘之證然惟骨痛脈緊無汗為麻黃湯的證其餘則太陽中風亦得有之學者若不以骨痛脈緊無汗為主而但拘頭痛發熱等證必致發非所當發矣雖本文不言脈緊然可從無汗而推猶太陽傷寒條不言無汗而以脈緊該之也麻黃湯方麻黃三兩去節桂枝三兩去皮甘草一兩炙杏仁七十個去皮尖上四味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息人之傷於寒也陽氣鬱而成熱皮膚閉而成實麻黃輕以去實辛以散寒溫以行陽杏仁佐麻黃達肺氣泄皮毛止喘急王好古謂其治衛實之藥是也然泄而不收升而不降桂枝甘草雖曰佐之實以監之耳脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯二條憑脈以言治而不及證且但舉浮與數而不言緊而云可與麻黃湯發汗殊為未備然仲景自有太陽傷寒條與麻黃湯證在學者當會通全書而求之不可拘於一文一字間也太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之脈浮緊無汗發熱身疼痛太陽麻黃湯證也至八九日之久而不解表證仍在者仍宜以麻黃湯發之所謂治傷寒不可拘於日數但見表證脈浮者雖數日猶宜汗之是也乃服藥已病雖微除而其人發煩目瞑者衛中之邪得解而營中之熱未除也劇者血為熱搏勢必成衄衄則營中之熱亦除而病乃解所以然者陽氣太重營衛俱實故須汗血並出而後邪氣乃解耳陽氣陽中之邪氣也郭白雲云麻黃湯主之五字當在此當發其汗下是傷寒脈浮緊不發汗因致衄者麻黃湯主之太陽病脈浮緊發熱身無汗自衄者愈傷寒脈浮緊者邪氣在表法當汗解而不發汗則邪無從達泄內搏於血必致衄也衄則其邪當去而猶以麻黃湯主之者此亦營衛並實如上條所云陽氣重之證上條衛已解而營未和故雖已發汗猶須得衄而解此條營雖通而衛尚塞故既已自衄而仍與麻黃湯發汗而愈然必欲衄而血不流雖衄而熱不解者乃為合法不然靡有不竭其陰者於是仲景復著奪血無汗之例曰脈浮緊發熱身無汗自衄者愈謂陽氣重者須汗血並出以泄其邪其稍輕者設得衄血邪必自解身雖無汗固不必更以麻黃湯發之也太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯太陽病至十餘日之久脈浮不緊而細人不躁煩而嗜臥所謂緊去人安其病為已解也下二段是就未解時說謂脈浮細不嗜臥而胸滿脅痛者邪已入少陽為未解也則當與小柴胡湯若脈但浮而不細不嗜臥者邪猶在太陽而未解也仍當與麻黃湯非外已解而猶和之發之之謂也合病證治六條太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之胸中為陽之位喘而胸滿者病發於陽而盛於陽也邪在陽則可汗在陰則可下此以陽邪盛於陽位故不可下之以虛其里裡虛則邪且陷矣而宜麻黃湯汗之以疏其表表疏則邪自解矣合病者兩經同病邪氣盛者其傷必多甚則遍及三陽也太陽與陽明合病者必自下利葛根湯主之太陽與陽明合病不下利但嘔者葛根加半夏湯主之傷寒之邪在上則為喘滿入里則為下利兩陽合病邪氣盛大不特充斥於上抑且浸淫於裡故曰必自下利其不下利者則必上逆而嘔晰而言之合病下利者裡氣得熱而下行也不下利但嘔者裡氣得熱而上行也夫邪盛於外而之內者仍當先治其邪葛根湯合用桂枝麻黃而加葛根所以解經中兩陽相合之邪其不下利而但嘔者則加半夏以下逆氣而葛根解外法所不易矣葛根湯方葛根四兩生薑三兩切甘草二兩炙芍藥二兩桂枝二兩去皮麻黃三兩去節湯炮去黃汁焙乾稱大棗十二枚擘上七味以水一斗先煮葛根麻黃減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌葛根加半夏湯方於葛根湯內加半夏半升洗太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之少陽居表裡之間視陽明為較深其熱氣尤易內侵是以太陽與少陽合病亦自下利而治法則不同矣太陽陽明合病者其邪近外驅之使從外出為易太陽少陽合病者其邪近里治之使從里和為易故彼用葛根而此與黃芩也夫熱氣內淫黃芩之苦可以清之腸胃得熱而不固芍藥之酸甘草之甘可以固之若嘔者熱上逆也故加半夏生薑以散逆氣而黃芩之清裡亦法所不易矣黃芩湯方黃芩三兩甘草二兩炙芍藥二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩加半夏生薑湯方於黃芩湯內加半夏半升生薑三兩余依前法三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之此條叔和隸陽明篇中三陽合病脈浮大上關上但欲眠睡目合則汗此條隸少陽篇中三陽合病視諸合病邪氣為較大矣而太陽之腑膀胱陽明之腑胃少陽之腑膽熱邪盛滿自經入腑故腹滿身重口不仁而面垢譫語遺尿及但欲眠睡目合則汗皆為里為熱之徵也夫里而不表故不可汗汗之則津亡胃燥而譫語熱而不實復不可下下之則中傷氣竭而額上生汗手足逆冷若自汗出句頂腹滿身重四句來謂有腹滿身重等證而自汗出者則雖三陽合病而邪聚於陽明者較太陽為多故宜白虎湯清而解之若不自汗出者則太陽為多白虎不可與矣脈浮大上關上者病盛於陽經故脈亦盛於陽位也但欲眠睡者熱勝而神昏也目合則汗者膽熱則液泄也此條蓋補上條之所未備而熱之聚於少陽者視太陽陽明較多矣設求治法豈白虎湯所能盡哉白虎湯方石膏一斤知母六兩甘草二兩粳米六合上先煮石膏數十沸再投藥米米熟湯成溫服辨傷寒受病陰陽不同一條病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也此條特舉陽經陰經受邪之異而辨其病狀及其愈期發於陽者病在陽之經也以寒加陽陽氣被郁故發熱而惡寒發於陰者病在陰之經也以陰加陰無陽可郁故無熱而但惡寒耳夫陽受邪者必陽氣充而邪乃解陰受病者必陰氣盛而病始退七日為陽氣來復之日六日為陰氣盛滿之候故其病當愈耳然六日七日亦是概言陰陽病愈之法大都如此學者勿泥可也太陽病愈時日及欲解之候與傳經之證六條太陽病頭痛至七日以上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈太陽病頭痛所謂病發於陽也法當七日愈云以上者該常與變而言之也行其經盡者邪行諸經盡而當解也設不解則將從太陽而復入陽明所謂作再經也故針足陽明以引邪外出邪出則經不傳而愈矣蓋傷寒之邪有在經在腑在臟之異行其經盡者邪行諸經而未入臟腑之謂而經脈陰陽相貫如環無端是以行陰極而復行陽者有之若入厥陰之臟則病深熱極而死耳其或幸而不死者則從臟出腑而愈未聞有作經再傳者也此條諸註釋俱誤蓋於經腑臟未審耳再按內經云傷寒一日巨陽受之云云又云七日太陽病衰頭痛少愈云云蓋傷寒之邪有離太陽而入陽明者有遍傳諸經而猶未離太陽者此太陽病頭痛至七日以上自愈正與內經之旨相合蓋六日邪遍六經至七日而太陽先受者當先解耳則是所謂行其經盡者不但未入腑臟亦並未離太陽所以當有頭痛所謂作再經者七日不愈而欲至十四日也針足陽明者以其經多氣多血可以任受針石且離太陽未遠尤易逐邪外出耳太陽病欲解時從巳至未止太陽經為諸陽之長巳午未時為陽中之陽太陽病解必從巳至未所謂陽受病者必陽氣充而邪乃解也與發於陽者七日愈同意風家表解而不了了者十二日愈風家表解邪退而正安矣而猶不能霍然無患者邪去未盡故也十二日經氣已周餘邪畢達故必自愈欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也邪氣欲解之候必先見之於證與脈若其人自煩而脈浮者知其邪必將從汗而解蓋自煩為邪正相爭之候而脈浮為邪氣外達之徵也設脈不浮而沉則雖煩豈能作汗即汗亦豈得解哉傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒二三日陽明少陽證不見者為不傳也寒氣外入先中皮膚太陽之經居三陽之表故受邪為最先而邪有微甚證有緩急體有強弱病有傳與不傳之異邪微者不能撓乎正其脈多靜邪甚者得與正相爭其脈則數急其人則躁煩而頗欲吐蓋寒邪稍深即變而成熱胃氣惡邪則逆而欲吐也然邪既傳經則必遞見他經之證傷寒二三日陽明少陽受病之時而不見有身熱惡熱口苦咽乾目眩等證則邪氣止在太陽而不更傳陽明少陽可知仲景示人以推測病情之法如此太陽權變法第二不可發汗例十條咽喉乾燥者不可發汗病寒之人非汗不解而亦有不可發汗者不可不審咽喉者諸陰之所集而乾燥則陰不足矣汗者出於陽而生於陰也故咽喉乾燥者雖有邪氣不可以溫藥發汗若強發之乾燥益甚為咳為咽痛為吐膿血無所不至矣云不可發汗者謂本當汗而不可發之非本不當汗之證也此所謂之變也下文仿此淋家不可發汗發汗必便血巢氏云淋者腎虛而膀胱熱也更發其汗損傷臟陰增益腑熱則必便血如強發少陰汗而動其血之例也瘡家雖身疼痛不可發汗汗出則痙身疼痛表有邪也瘡家膿血流溢損傷陰氣雖有表邪不可發汗汗之血虛生風必發痙也衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠額上陷脈緊急者額上兩旁之動脈陷伏不起或緊急不柔也靈樞云兩跗之上脈陷豎者足陽明陷謂陷伏豎即緊急與此正相發明目直視不能眴不得眠皆亡陰之證也亡血家不可發汗發汗則寒慄而振陰亡者陽不守亡血復汗寒慄而振者陰氣先虛而陽氣後竭也按瘡家衄家並屬亡血而此條復出亡血家者該吐下跌僕金刃產後等證為言也汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸五液在心為汗心液亡者心陽無附則恍惚心亂心虛生熱下流所合則小便已陰疼禹餘糧丸方缺常器之云只禹餘糧一味火煅服亦可按禹餘糧體重可以去怯甘寒可以除熱又性澀主下焦前後諸病也病人有寒復發汗胃中冷必吐蛔有寒里有寒也里有寒者雖有表邪必先溫里而後攻表如後四逆湯之法乃不與溫里而反發汗損傷陽氣胃中虛冷必吐蛔也形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈形作傷寒其脈當弦緊而反弱為病實而正虛也脈弱為陰不足而邪氣乘之生熱損陰則必發渴乃更以火劫汗兩熱相合胃中燥煩汗必不出而譫語立至矣若發熱脈浮則邪欲出表陰氣雖虛可解之使從汗而愈如下條桂枝二越婢一等法若脈不浮則邪熱內擾將救陰之不暇而可更取其汗耶脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈脈浮數者其病在表法當汗出而愈所謂脈浮數者可發汗宜麻黃湯是也若下之邪入里而身重氣內虛而心悸者表雖不解不可以藥發汗當俟其汗自出而邪乃解所以然者尺中脈微為裡虛不足若更發汗則並虛其表里無護衛而散亡隨之矣故必候其表裡氣復津液通和而後汗出而愈豈可以藥強迫之哉脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知然以營氣不足血少故也脈浮緊者寒邪在表於法當身疼痛而其治宜發汗假令尺中脈遲知其營虛而血不足則雖身疼痛而不可發汗所以然者汗出於陽而生於陰營血不足而強發之汗必不出汗即出而筋惕肉瞤散亡隨之矣可不慎哉桂枝二越婢一湯脈證一條太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯無陽與亡陽不同亡陽者陽外亡而不守也其根在腎無陽者陽內竭而不用也其源在胃發熱惡寒熱多寒少病須得汗而解而脈微弱則陽無氣矣陽者津液之根猶水之氣也無氣則水不至無陽則津不化而汗之源絕矣雖發之其可得乎故用桂枝二分生化陰陽越婢一分發散邪氣設得小汗其邪必解乃傷寒發汗之變法也桂枝二越婢一湯方論見後桂枝去皮芍藥甘草炙麻黃去節各十八銖生薑一兩三錢切大棗四枚擘石膏二十四銖碎綿裹上七味㕮咀以水五升煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升桂枝麻黃各半湯脈證一條太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯病在太陽至八九日之久而不傳他經其表邪本微可知不嘔清便欲自可則里未受邪可知病如瘧狀非真是瘧亦非傳少陽也乃正氣內勝數與邪爭故也至熱多寒少一日二三度發則邪氣不勝而將退舍矣更審其脈而參驗之若得微緩則欲愈之象也若脈微而惡寒者此陰陽俱虛當與溫養如新加湯之例而發汗吐下均在所禁矣若面色反有熱色者邪氣欲從表出而不得小汗則邪無從出如面色緣緣正赤陽氣怫鬱在表當解之熏之之類也身癢者邪盛而攻走經筋則痛邪微而遊行皮膚則癢也夫既不得汗出則非桂枝所能解而邪氣又微亦非麻黃所可發故合兩方為一方變大製為小制桂枝所以為汗液之地麻黃所以為發散之用且不使藥過病以傷其正也桂枝麻黃各半湯方桂枝去皮麻黃去節甘草炙芍藥生薑各一兩大棗四枚杏仁二十四個湯浸去皮上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去滓溫服六合合論桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯三方按桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯三方並兩方合用乃古之所謂複方也細審其制桂枝麻黃各半湯助正之力侔於散邪桂枝二麻黃一湯則助正之力多而散邪之力少於法為較和矣其桂枝二越婢一湯本無熱證而加石膏者以其人無陽津液不足不勝桂枝之任故加甘寒於內少變辛溫之性且滋津液之用而其方制之小示微發於不發之中則三方如一方也故桂枝湯不特發散邪氣亦能補助正氣以其方甘酸辛合用具生陽化陰之妙與麻黃合劑則能盡麻黃之力而並去其悍與石膏同用則能資石膏之益而不撓乎權是雖麻石並行而實以桂枝為主蓋非滋養營衛則無以為發汗散邪之地耳凡正氣不足邪氣亦微而仍須得汗而解者宜於此三方取則焉後人不能盡桂枝之用而求之人參歸地之屬立意則同而用藥懸殊矣大青龍湯脈證二條太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也此治中風而表實者之法表實之人不易得邪設得之則不能泄衛氣而反以實陽氣陽氣既實表不得通閉熱於經則脈緊身痛不汗出而煩躁也是當以麻黃桂姜之屬以發汗而泄表實加石膏以除裡熱而止煩躁非桂枝湯所得而治者矣蓋其病已非中風之常病則其法亦不得守桂枝之常法仲景特舉此者欲人知常知變不使拘中風之名而拘解肌之法也若脈微弱汗出惡風則表虛不實設與大青龍湯發越陽氣必致厥逆筋惕肉瞤甚則汗多而陽亡矣故曰此為逆逆者虛以實治於理不順所以謂之逆也大青龍湯方麻黃六兩去節桂枝二兩去皮甘草二兩炙大棗十二枚擘石膏如雞子大碎生薑三兩切杏仁四十個去皮尖上七味以水九升先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也按傷寒分立三綱桂枝主風傷衛麻黃主寒傷營大青龍主風寒兩傷營衛其說始於成氏許氏而成於方氏喻氏以愚觀之桂枝主風傷衛則是麻黃主寒傷營則非蓋有衛病而營不病者矣未有營病而衛不病者也至於大青龍證其辨不在營衛兩病而在煩躁一證其立方之旨亦不在並用麻桂而在獨加石膏王文祿謂風寒並重閉熱於經故加石膏於發散藥中是也若不過風寒併發則麻黃桂枝已足勝其任矣何必更須石膏哉須知中風而或表實亦用麻黃傷寒而或表虛亦用桂枝其表不得泄而閉熱於中者則用石膏其無熱者但用麻桂此仲景心法也炫新說而變舊章其於斯道不愈趨而愈遠哉傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之傷寒脈浮緩者脈緊去而成緩為寒欲變熱之證經曰脈緩者多熱是也傷寒邪在表則身疼邪入里則身重寒已變熱而脈緩經脈不為拘急故身不疼而但重而其脈猶浮則邪氣在或進或退之時故身體有乍重乍輕之候也是以欲發其表則經已有熱欲清其熱則表猶不解而大青龍湯兼擅發表解熱之長苟無少陰汗出厥逆等證者則必以此法為良矣不云主之而云發之者謂邪欲入里而以藥發之使從表出也舊注謂傷寒見風故並用麻黃者非小青龍湯脈證二條傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之表寒不解而心下有水飲飲寒相摶逆於肺胃之間為乾嘔發熱而咳乃傷寒之兼證也夫飲之為物隨氣升降無處不到或壅於上或積於中或滯於下各隨其所之而為病而其治法雖各有加減要不出小青龍之一法麻黃桂枝散外入之寒邪半夏細辛乾薑消內積之寒飲芍藥五味監麻桂之性且使表裡之藥相就而不相格耳小青龍湯方麻黃桂枝芍藥細辛乾薑炙甘草各三兩五味半夏各半升上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升大青龍合麻桂而加石膏能發邪氣除煩躁小青龍無石膏有半夏乾薑芍藥細辛五味能散寒邪行水飲而通謂之青龍者以其有發汗蠲飲之功夫熱閉於經而不用石膏汗為熱隔寧有能發之者乎飲伏於內而不用薑夏寒與飲摶寧有能散之者乎其芍藥五味不特收逆氣而安肺氣抑以制麻桂薑辛之勢使不相驚而相就以成內外協濟之功耳加減法若微利者去麻黃加芫花如雞子大熬令赤色微利者水漬入胃也下利者不可攻其表故去麻黃之發表而加芫花之行水若渴者去半夏加栝蔞根三兩渴者津液不足故去半夏之辛燥而加栝蔞之苦潤若飲結不布而渴者似宜仍以半夏流濕而潤燥也若噎者去麻黃加附子一枚炮噎者寒飲積中也附子溫能散寒辛能破飲故加之麻黃髮陽氣增胃冷故去之若小便不利小腹滿去麻黃加茯苓四兩小便不利小腹滿水蓄於下也故加茯苓以泄蓄水不用麻黃恐其引氣上行致水不下也若喘者去麻黃加杏仁半升去皮尖喘者水氣在肺故加杏仁下氣泄肺麻黃亦能治喘而不用者惡其發氣也傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之內飲外寒相得不解氣凌於肺為咳而微喘發熱不渴如上條之證也是必以小青龍外解寒邪內消水飲為主矣若服湯已渴者是寒外解而飲內行也故為欲解小青龍湯主之六字當在發熱不渴下或問水飲之證或渴或不渴云何曰水積於中故不渴也其渴者水積一處而不得四布也然而不渴者常也其渴者變也服小青龍湯已而渴者乃寒去飲消之常道也十棗湯證治一條太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之此外中風寒內有懸飲之證下利嘔逆飲之上攻而復下注也然必風邪已解而後可攻其飲若其人漐漐汗出而不惡寒為表已解心下痞硬滿引脅下痛乾嘔短氣為里未和雖頭痛而發作有時知非風邪在經而是飲氣上攻也故宜十棗湯下氣逐飲十棗湯方芫花熬甘遂大戟大棗十枚上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納諸藥末強人服一錢匕羸人服半錢溫服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養按金匱云飲後水流在脅下咳吐引痛謂之懸飲又云病懸飲者十棗湯主之此心下痞硬滿引脅下痛所以知其為懸飲也懸飲非攻不去芫花甘遂大戟並逐飲之峻藥而欲攻其飲必顧其正大棗甘溫以益中氣使不受藥毒也五苓散證治一條中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之太陽風邪至六七日之久而不解則風變熱而傳裡故煩而渴有表裡證即身熱煩渴之謂渴欲飲水水氣不行而反上逆則吐名水逆者言因水氣而逆非火逆氣逆之謂故當以五苓散辛甘淡藥導水而泄熱也五苓散方豬苓茯苓白朮各十八銖桂枝半兩澤瀉一兩六銖上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈表實裡虛四逆湯先救里一條病發熱頭痛脈反沉若不瘥身體疼痛當救其里宜四逆湯發熱身疼痛邪在表也而脈反沉則脈與病左矣不瘥者謂以汗藥發之而不瘥也以其裡氣虛寒無以為發汗散邪之地故與四逆湯舍其表而救其里如下利身疼痛之例也四逆湯方生附子一枚乾薑一兩半炙甘草二兩上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩陽微先汗陰微先下隨脈施治一條太陽病未解脈陰陽俱停必先振慄汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之脈陰陽俱停者陰陽諸脈兩相停勻而無偏勝也既無偏勝則必有相持不下之勢故必至於戰而汗出而後邪氣乃解振慄者陰陽相爭之候也但陽脈微者陽邪先衰故當汗出而解但陰脈微者陰邪先衰故可下之而解所謂攻其堅而不入者攻其瑕而立破也然本論云尺中脈微者不可下此又云但陰脈微者下之而解蓋彼為正虛而微此為邪退而微也脈微則同而辨之於邪與正之間亦未易言之矣調胃承氣乃下藥之最輕者以因勢利導故不取大下而取緩行耳夫傷寒先汗後下者法之常也或先汗或先下隨脈轉移者法之變也設不知此而汗下妄施寧不為逆耶調胃承氣湯方大黃四兩去皮炙甘草二兩芒硝半斤上三味以水三升煮取一升去滓納芒硝更上火微煮令沸少少溫服之傷寒裡虛法先補里二條傷寒二三日心中悸而煩者小建中湯主之傷寒裡虛則悸邪擾則煩二三日悸而煩者正虛不足而邪欲入內也是不可攻其邪但與小建中湯溫養中氣中氣立則邪自解即不解而攻取之法亦可因而施矣仲景御變之法如此誰謂傷寒非全書哉小建中湯方桂枝去皮炙甘草生薑各三兩芍藥六兩膠飴一升大棗十二枚擘上五味以水七升煮取三升去滓納膠飴更上微火消解溫服一升日三服傷寒脈結代心動悸炙甘草湯主之脈結代者邪氣阻滯而營衛澀少也心動悸者神氣不振而都城震驚也是雖有邪氣而攻取之法無所施矣故宜人參薑桂以益衛氣膠麥麻地甘棗以益營氣營衛既充脈復神完而後從而取之則無有不服者矣此又擴建中之制為陰陽並調之法如此今人治病不問虛實概與攻發豈知真氣不立病雖去亦必不生況病未必去耶炙甘草湯方一名復脈湯甘草四兩炙生薑三兩桂枝三兩去皮人參二兩阿膠二兩麥冬半升去心生地一斤麻仁半升大棗三十枚上九味以清酒七升水八升先煮八味取三升去滓內膠烊消盡溫服一升日三服結陰代陰脈法一條脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治脈來數時一止復來者名曰促脈來緩時一止復來者名曰結結者邪氣結滯而脈之行不利也又結與代相似而實不同結脈止而即還不失至數但少瘥遲耳代脈止而不還斷已復動有此絕而彼來代之意故名曰代而俱謂之陰者結代脈皆為陰故謂之結陰代陰也凡病得此脈者攻之則邪未必去而正轉傷補之則正未得益而邪反滯故曰難治仲景因上條脈結代而詳言其狀如此以上並太陽權變之法權變者謂有汗證而不得逕用汗藥也而其間或取小汗或待其自解或兼清熱或兼消飲或先救里或建中氣或養營衛種種不同世道日降人心不古凡所患病類多兼證學者於此等變法尤當著意故特類列於此凡二十三條太陽斡旋法第三服桂枝湯後證治六條太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈太陽病與桂枝湯於法為當矣乃初服之反加煩熱而不解者陽邪痹於陽而不去也風池風府陽維之會陽維者諸陽之所維刺之所以通陽痹痹通然後與桂枝取汗則愈此仲景法中之法也服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯服桂枝湯汗雖大出而邪不去所謂如水淋漓病必不除也若脈洪大則邪猶甚故宜更與桂枝取汗如前法者如啜熱稀粥溫覆取汗之法也若其人病形如瘧而一日再發則正氣內勝邪氣欲退之徵設得汗出其邪必從表解然非重劑所可發者桂枝二麻黃一湯以助正而兼散邪而又約小其制乃太陽發汗之輕劑也桂枝二麻黃一湯方論見後桂枝去皮一兩十七銖大棗五枚擘炙甘草芍藥生薑各一兩六銖麻黃十六銖去節杏仁十六個去皮尖上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取二升去滓溫服一升日再服服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之服桂枝湯後大汗出脈洪大與上條同而大煩渴不解則其邪去表而之裡不在太陽之經而入陽明之腑矣陽明者兩陽之交而津液之腑也邪氣入之足以增熱氣而耗津液是以大煩渴不解方用石膏辛甘大寒直清胃熱為君而以知母之鹹寒佐之人參甘草粳米之甘則以之救津液之虛抑以制石膏之悍也曰白虎者蓋取金氣徹熱之義云耳白虎加人參湯方人參三兩知母六兩甘草二兩粳米六合石膏一斤碎上五味以水一斗煮米熟湯成去滓溫服一升日三服服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之頭項強痛翕翕發熱無汗邪在表也心下滿微痛飲在裡也此表間之邪與心下之飲相得不解是以發之而不從表出奪之而不從下出也夫表邪挾飲者不可攻表必治其飲而後表可解桂枝湯去桂加茯苓白朮則不欲散邪於表而但逐飲於裡飲去則不特滿痛除而表邪無附亦自解矣桂枝去桂加茯苓白朮湯方於桂枝湯內去桂枝加茯苓白朮各三兩余依前法煮服小便利即愈傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之脈浮自汗出微惡寒者雖傷於寒而表不實乃桂枝湯證也然小便數心煩腳攣急則陰虛而裡熱矣是當以甘辛攻表而以甘寒顧里乃反與桂枝湯治表而遺里宜其得之而便厥也咽中干煩躁吐逆皆陰虛陽逆之象設非以溫藥徒攻其表何至此哉夫既陰虛於下而又陽逆於上則必先復陽氣而後復陰氣故作甘草乾薑湯甘辛復陽之劑陽復則厥愈而足溫矣更作芍藥甘草湯甘酸復陰之劑陰生則兩腳自伸矣陰陽既復而或胃氣有未和因而譫語者則少與調胃承氣湯以和其胃胃和則譫語止矣蓋甘草乾薑固足以救虛陽之逆而亦能傷胃氣之和此鹹寒調胃之法不得不斡旋於陰陽既復之後也若重發汗復加燒針是逆而再逆其厥逆之象必有加於前而補救之法必非甘草乾薑所能勝任者矣四逆湯甘辛大熱乃克復陽氣之大藥也此條前後用藥溫涼補瀉絕不相謀而適以相濟非深造自得卓有成見者烏能及此甘草乾薑湯方甘草四兩炙乾薑二兩上㕮咀以水三升煮一升五合去滓分溫再服芍藥甘草湯方芍藥四兩甘草四兩炙上二味以水三升煮一升五合去滓分溫再服問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以知之答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈此即前條之意而設為問答以明所以增劇及所以病愈之故然中間語意殊無倫次此豈後人之文耶昔人讀考工記謂不類於周官余於此條亦云成氏云陽旦桂枝湯別名發汗後脈證治法十五條太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之發汗傷陽外風復襲汗遂不止活人所謂漏風是也夫陽者所以實腠理行津液運肢體者也今陽已虛不能護其外復不能行於里則汗出小便難而邪風之氣方外淫而旁溢則惡風四肢微急難以屈伸是宜桂枝湯解散風邪兼和營衛加附子補助陽氣並御虛風也桂枝加附子湯方於桂枝湯內加附子一枚破八片炮去皮余依前法發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之發汗後邪痹於外而營虛於內故身痛不除而脈轉沉遲經曰其脈沉者營氣微也又曰遲者營氣不足血少故也故以桂枝加芍藥生薑人參以益不足之血而散未盡之邪東垣云仲景於病人汗後身熱亡血脈沉遲者下利身涼脈微血虛者並加人參古人血脫者必益氣也然人參味甘氣溫溫固養氣甘亦實能生血汗下之後血氣虛衰者非此不為功矣發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之心為陽臟而汗為心之液發汗過多心陽則傷其人叉手自冒心者裡虛欲為外護也悸心動也欲得按者心中築築不寧欲得按而止之也是宜補助心陽為主桂枝甘草辛甘相合乃生陽化氣之良劑也桂枝甘草湯方桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服按發汗過多有動腎中之陽者以陽為汗之根而腎為陽之宅枝傷者其本必戕也有動心中之陽者以汗為心之液而心為陽之臟液亡者氣必從之也救腎陽者必以鹹溫救心陽者必以甘辛咸性善下而溫能返陽故四逆為救腎之劑甘辛相合而陽氣乃生故桂甘為益心之法也未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此病人叉手自冒心者心陽內虛欲得外護如上條所云也耳聾者陽氣上虛陰反得而實之也師因叉手冒心而更試耳之聰否以求陽之虛實若耳聾無聞其為過汗致虛當與溫養無疑臨病之工宜如是詳審耳許叔微曰傷寒耳聾發汗過多者正氣虛也邪不出者邪氣閉也虛之與閉治法懸殊學者更宜詳審太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之發汗過多不能解太陽之邪而反動少陰之氣於是身仍發熱而悸眩瞤動等證作矣少陰之氣水氣也心屬火而水乘之故悸頭為陽而陰加之故眩經脈綱維一身以行血氣故水入之則振振瞤動也擗猶據也眩動之極心體不安思欲據地以自固也此與陽虛外亡有別陽虛者但須四逆以復陽此兼水飲故必真武以鎮水方用白朮茯苓之甘淡以培土而行水附子生薑之辛以復陽而散邪芍藥之酸則入陰斂液使氾濫之水盡歸大壑而已耳真武湯方茯苓三兩芍藥三兩白朮二兩生薑三兩附子一枚炮去皮破八片上五味以水八升煮取三升去滓溫服七合日三服發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之發汗後臍下悸者心氣不足而腎氣乘之也奔豚腎之積發則從少腹上衝心胸如豕之突故名奔豚又腎為水臟豚為水畜腎氣上衝故名奔豚茯苓能泄水氣故以為君桂枝能伐腎邪故以為臣然欲治其水必防其土故取甘草大棗補益土氣為使甘瀾水者揚之令輕使水氣去不益腎邪也茯苓桂枝甘草大棗湯方茯苓半斤桂枝四兩甘草三兩大棗十五枚上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以勺揚之水上有珠子五六千顆相逐取用之病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也脈數為熱乃不能消穀而反吐者浮熱在上而虛冷在下也浮熱不能消穀為虛冷之氣逼而上浮如客之寄不久即散故曰客熱是雖脈數如熱而實為胃中虛冷不可更以寒藥益其疾也發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之發汗後表邪雖解而腹脹滿者汗多傷陽氣窒不行也是不可以徒補補之則氣愈窒亦不可以逕攻攻之則陽益傷故以人參甘草生薑助陽氣厚朴半夏行滯氣乃補泄兼行之法也厚朴生薑甘草半夏人參湯方生薑半斤切半夏半升洗甘草二兩炙人參一兩厚朴半斤去皮炙上五味以水一斗煮取三升去滓溫服一升日三服傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯主之傷寒發汗解半日許復煩者非舊邪去而新邪復乘也餘邪未盡復集為病如余寇未盡復合為亂耳脈浮數者邪氣在表之徵故可更發其汗以盡其邪但以已汗復汗故不宜麻黃之峻劑而宜桂枝之緩法此仲景隨時變易之妙也發汗病不解反惡寒者虛故也芍藥附子甘草湯主之發汗不解反加惡寒者邪氣不從汗而出正氣反因汗而虛也是不可更逐邪氣當先復其正氣是方芍藥之酸可以益血附子之辛可以復氣甘草甘平不特安中補虛且與酸合而化陰與辛合而生陽也芍藥甘草附子湯方芍藥三兩甘草三兩炙附子一枚炮破八片上三味以水五升煮取一升五合去滓分溫服發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯汗出而惡寒者陽不足而為虛也芍藥甘草附子湯治之是已汗出而不惡寒但熱者邪入里而成實也然不可以峻攻但與調胃承氣湯和其胃氣而已發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯發汗後汗出而喘無大熱者其邪不在肌腠而入肺中緣邪氣外閉之時肺中已自蘊熱發汗之後其邪不從汗而出之表者必從內而並於肺耳故以麻黃杏仁之辛而入肺者利肺氣散邪氣甘草之甘平石膏之甘辛而寒者益肺氣除熱氣而桂枝不可更行矣蓋肺中之邪非麻黃杏仁不能發而寒鬱之熱非石膏不能除甘草不特救肺氣之困抑以緩石膏之悍也麻黃杏仁甘草石膏湯方麻黃四兩去節杏仁五十枚去皮尖炙甘草二兩石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫納諸藥煮取二升去滓溫服一升發汗後飲水多必喘以水灌之亦喘發汗之後肺氣必虛設飲水過多水氣從胃上射肺中必喘或以水灌洗致汗水寒之氣從皮毛而內侵其所合亦喘成氏謂喘為肺疾是也發汗後水藥不得入口為逆若更發汗必吐下不止發汗後吐逆至水藥不得入口者必其人素有積飲乘汗藥升浮之性而上行也是當消飲下氣雖有表邪不可更發其汗設更發之重傷陽氣其飲之在中者不特上逆而仍吐嘔亦且下注而成泄利矣太陽病小便利者以飲水多必心下悸小便少者必苦裡急也病在太陽之時裡熱未甚水液尚通其外雖病而其內猶晏如也故不可多飲水設飲水多必停於心下為悸所以然者里無熱不能消水心屬火而畏水水多凌心故惕惕然跳動不寧也然使小便自利則停水自行雖悸猶當自愈若小便不利而少則水不下行積於膀胱必苦裡急裡急者小便欲行而不能則小腹奔迫急痛也此以飲水所致比於汗下之過而非太陽本病故附於斡旋法下以上十五條併發汗後證而或傷衛陽或損營血或亡心陽或動腎水或傷胃陽及傷脾氣或邪仍不解或解而轉屬陽明及傳膀胱或動飲氣或傷肺氣或入肺中其變種種不同其治因之各異學者諳練在心亦可以應變無窮矣發汗吐下解後病脈證治三條傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之傷寒發汗或吐或下邪氣則解而心下痞硬噫氣不除者胃氣弱而未和痰氣動而上逆也旋覆花鹹溫行水下氣代赭石味苦質重能墜痰降氣半夏生薑辛溫人參大棗甘草甘溫合而用之所以和胃氣而止虛逆也旋覆代赭石湯方旋覆花三兩人參二兩炙甘草三兩生薑五兩切半夏半升洗代赭石一兩大棗十二枚擘上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之此傷寒邪解而飲發之證飲停於中則滿逆於上則氣衝而頭眩入於經則身振振而動搖金匱云膈間支飲其人喘滿心下痞堅其脈沉緊又云心下有痰飲胸脅支滿目眩又云其人振振身瞤劇必有伏飲是也發汗則動經者無邪可發而反動其經氣故與茯苓白朮以蠲飲氣桂枝甘草以生陽氣所謂病痰飲者當以溫藥和之也茯苓桂枝白朮甘草湯方茯苓四兩桂枝三兩白朮炙甘草各二兩上四味以水六升煮取三升分溫三服凡病若發汗若吐若下若亡津液陰陽自和者必自愈陰陽自和者不偏於陰不偏於陽汗液自出便溺自調之謂汗吐下亡津液後邪氣既微正氣得守故必自愈太陽傳本證治七條太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之傷寒之邪有離太陽之經而入陽明之腑者有離太陽之標而入太陽之本者發汗後汗出胃干煩躁飲水者病去表而之裡為陽明腑熱證也脈浮小便不利微熱消渴者病去標而之本為膀胱腑熱證也在陽明者熱能消水與水即所以和胃在膀胱者水與熱結利水即所以去熱多服暖水汗出者以其脈浮而身有微熱故以此兼徹其表昔人謂五苓散為表裡兩解之劑非以此耶五苓散方方見權變法按古法從經腑言則太陽為經而膀胱為腑從標本言則太陽為標膀胱為本病去太陽而之膀胱所以謂之太陽傳本也然膀胱本病有水結血結之不同水結宜五苓散導水泄熱血結宜桃核承氣及抵當湯丸導血除熱具如下文發汗已脈浮數煩渴者五苓散主之傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之發汗已脈浮數煩渴者太陽經病傳腑寒邪變熱之候故與五苓散導水泄熱王宇泰云太陽經也膀胱腑也膀胱者溺之室也故東垣以渴為膀胱經本病然則治渴者當瀉膀胱之熱瀉膀胱之熱者利小便而已矣然腑病又有渴與不渴之異由腑陽有盛與不足之故也渴者熱盛思水水與熱得故宜五苓散導水泄熱不渴者熱雖入里不與水結則與茯苓甘草湯行陽化氣此膀胱熱盛熱微之辨也茯苓甘草湯方茯苓二兩桂枝二兩去皮生薑二兩切甘草一兩炙上四味以水四升煮取二升去滓分溫三服太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯太陽之邪不從表出而內傳於腑與血相搏名曰蓄血其人當如狂所謂蓄血在下其人如狂是也其證當下血血下則熱隨血出而愈所謂血病見血自愈也如其不愈而少腹急結者必以法攻而去之然其外證不解者則尚未可攻攻之恐血去而邪復入里也是必先解其外之邪而後攻其里之血所謂從外之內而盛於內者先治其外而後調其內也以下三條並太陽傳本熱邪入血血蓄下焦之證與太陽傳本熱與水結煩渴小便不利之證正相對照所謂熱邪傳本者有水結血結之不同也桃核承氣湯方桃核五十枚去皮尖桂枝二兩去皮芒硝二兩甘草二兩炙大黃四兩上五味以水七升煮取二升五合去滓納芒硝更上火微沸下火先食溫服五合日三服當微利愚按此即調胃承氣湯加桃仁桂枝為破瘀逐血之劑緣此證熱與血結故以大黃之苦寒蕩實除熱為君芒硝之鹹寒入血耎堅為臣桂枝之辛溫桃仁之辛潤擅逐血散邪之長為使甘草之甘緩諸藥之勢俾去邪而不傷正為佐也太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之此亦太陽熱結膀胱之證六七日表證仍在而脈微沉者病未離太陽之經而已入太陽之腑也反不結胸其人發狂者熱不在上而在下也少腹硬滿小便自利者不結於氣而結於血也下血則熱隨血去故愈所以然者太陽經也膀胱腑也太陽之邪隨經入里與血俱結於膀胱所謂經邪入腑亦謂之傳本是也抵當湯中水蛭虻蟲食血去瘀之力倍於芒硝而又無桂枝之甘辛甘草之甘緩視桃仁承氣湯為較峻矣蓋血自下者其血易動故宜緩劑以去未盡之邪瘀熱在裡者其血難動故須峻藥以破固結之勢也抵當湯方水蛭三十個熬虻蟲三十個熬去翅足大黃四兩酒浸桃仁三十個去皮尖上四味為末以水五升煮取三升去滓溫服一升不下更服太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之身黃脈沉結少腹硬水病血病皆得有之但審其小便不利者知水與熱蓄為無血而有水五苓散證也若小便自利其人如狂者乃熱與血結為無水而有血抵當湯證也設更與行水則非其治矣仲景以太陽熱入膀胱有水結血結之分故反復明辨如此傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸有熱身有熱也身有熱而少腹滿亦太陽熱邪傳本之證膀胱者水溺所由出其變為小便不利今反利者乃血瘀而非水結如上條抵當湯下之之例也云不可余藥者謂非抵當丸不能以治之耳抵當丸方水蛭二十個虻蟲二十個大黃三兩桃仁二十個去皮尖上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服愚按此條證治與前條大同而變湯為丸未詳何謂嘗考其制抵當丸中水蛭虻蟲減湯方三分之一而所服之數又居湯方十分之六是緩急之分不特在湯丸之故矣此其人必有不可不攻而又有不可峻攻之勢如身不發黃或脈不沉結之類仲景特未明言耳有志之士當不徒求之語言文字中也
