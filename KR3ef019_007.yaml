body:
  text: 卷七少陰篇辨列少陰條例大意少陰為太陽之裡居厥太二陰之間故有邪在太陽而已內及少陰者有寒中少陰而仍外連太陽者有邪在少陰而或兼厥陰或兼太陰者大抵連太陰者多發熱連厥陰者多厥利也是傳經直中之外又有不同如此且也直中之寒久亦化熱傳經之熱極必生陰茲篇先列脈證於前次清法次溫法又次為生死法欲學者明辨宜清宜溫之實不必但泥傳經直中之名也又其次為少陰病禁以少陰為汗下之例亦不得不著汗下之禁云凡四十五條為一卷少陰諸法少陰脈證四條少陰之為病脈微細但欲寐也經脈陽淺而陰深陽大而陰小邪傳少陰則脈之浮者轉為微大者轉為細也又多陽者多寤多陰者多寐邪傳少陰則目不瞑者轉而為但欲寐也夫少陰者三陰之樞也陽於是乎入而陰於是乎出故雖太陰厥陰同為陰臟而其為病實惟少陰為然而少陰之為病亦非獨脈微細但欲寐二端仲景特舉此者以為從陽入陰之際其脈證變見有如此少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也此少陰自受寒邪之證不從陽經來也寒初到經欲受不可欲卻不能故欲吐不吐心煩但欲寐而實不能寐也至五六日自利而渴則其邪已入少陰之臟矣然少陰陰臟也寒陰邪也以陰受陰法當不渴而渴者此非有熱以臟虛故引水自救耳更審其小便若色白者則少陰寒病全體大露無疑何以言之熱傳少陰自利而渴者邪熱足以消水其小便色必赤寒中少陰自利而渴者雖能飲而不能制其小便色必白也仲景辨證之精如此病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利陰陽俱緊太陽傷寒之脈也法當無汗而反汗出者表虛亡陽其病不屬太陽而屬少陰矣少陰之脈上膈循喉嚨少陰之臟為胃之關為二陰之司寒邪直入經臟俱受故當咽痛而復吐利也此為寒傷太陽陽虛不任因遂轉入少陰之證蓋太陽者少陰之表猶唇齒也唇亡則齒寒陽亡則陰及故曰少陰之邪從太陽飛渡者多也少陰病八九日一身手足盡熱者以熱在膀胱必便血也此熱傳少陰而復還入膀胱之證膀胱者太陽也太陽為三陽之表而多血少氣熱在膀胱則一身手足盡熱而熱氣有餘血為熱迫散而下行則必便血也少陰清法七條少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之少陰之熱有從陽經傳入者有自受寒邪久而變熱者曰二三日以上謂自二三日至五六日或八九日寒極而變熱也至心中煩不得臥則熱氣內動盡入血中而諸陰蒙其害矣蓋陽經之寒變則熱歸於氣或入於血陰經之寒變則熱入於血而不歸於氣此余歷試之驗也故用黃連黃芩之苦合阿膠芍藥雞子黃之甘併入血中以生陰氣而除邪熱成氏所謂陽有餘以苦除之陰不足以甘補之是也黃連阿膠湯方黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚上五味以水五升先煮三物取二升去滓納阿膠烊盡小冷內雞子黃攪令相得溫服七合日三服少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆四肢逆冷也此非熱厥亦太陽初受寒邪未郁為熱而便入少陰之證少陰為三陰之樞猶少陽為三陽之樞也其進而入則在陰退而出則就陽邪氣居之有可進可退時上時下之勢故其為病有或咳或悸或小便不利或腹中痛或泄利下重之證夫邪在外者可引而散之在內者可下而去之其在外內之間者則和解而分消之分消者半從外半從內之謂也故用柴胡之辛揚之使從外出枳實之苦抑之使其內消而其所以能內能外者則樞機之用為多故必以芍藥之酸益其陰甘草之甘養其陽曰四逆者因其所治之病而命之名耳而其制方大意亦與小柴胡相似四逆之柴胡枳實猶小柴胡之柴胡黃芩也四逆之芍藥甘草猶小柴胡之人參甘草也且枳實兼擅滌飲之長甘芍亦備營衛兩和之任特以為病有陰陽之異故用藥亦分氣血之殊而其輔正逐邪和解表裡則兩方如一方也舊謂此為治熱深發厥之藥非是夫果熱深發厥則屬厥應下之之例矣豈此藥所能治哉四逆散方柴胡枳實破水漬炙乾芍藥甘草炙上四味各十分搗篩白飲和服方寸匕日三服加減法咳者加五味子乾薑各五分並主下利成氏曰肺寒氣逆則咳五味子之酸收逆氣乾薑之辛散肺寒並主下利者肺與大腸為表裡上咳下利治則頗同悸者加桂枝五分悸者寒多心脈不通則心下鼓也桂枝辛溫入心通陽氣小便不利者加茯苓五分小便不利水聚於下也茯苓甘淡利竅滲水腹中痛者加附子一枚炮令坼腹中痛寒勝於里也附子辛溫散寒止痛泄利下重者先以水五升煮薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服泄利下重寒滯於下也薤白辛溫散寒通陽氣少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之少陰中寒下利至六七日寒變為熱而氣復上行為咳為嘔為渴為心煩不得眠所謂下行極而上也夫邪氣自下而上者仍須從下引而出之豬苓茯苓澤瀉滑石並甘淡下行之藥足勝導水泄熱之用然以陰病而屬邪熱設非得阿膠之鹹寒入陰何以馭諸陽藥而泄陰中之熱導浮上之氣哉少陰病下利咽痛胸滿心煩者豬膚湯主之少陰之脈從腎上貫肝膈入肺中循喉嚨其支別者從肺出絡心注胸中陽邪傳入少陰下為泄利上為咽痛胸滿心煩熱氣充斥脈中不特泄傷本臟之氣亦且消爍心肺之陰矣豬水蓄而膚甘寒其氣味先入少陰益陰除客熱止咽痛故以為君加白蜜之甘以緩急潤以除燥而煩滿愈白粉之甘能補中溫能養臟而泄利止矣豬膚湯方豬膚一斤以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之少陰熱氣隨經上衝咽傷生瘡不能語言音聲不出東垣所謂少陰邪入於裡上接於心與火俱化而剋金也故與半夏之辛以散結熱止咽痛雞子白甘寒入肺清熱氣通聲音苦酒苦酸消瘡腫散邪毒也苦酒湯方半夏十四枚洗破如棗核大雞子一枚去黃納上苦酒著雞子殼中納半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑服之少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯此亦熱傳少陰而上為咽痛之法甘草湯甘以緩急寒以除熱也其甚而不瘥者則必以辛發之而以甘緩之甘草桔梗甘辛合用而甘勝於辛治陰虛客熱其法輕重當如是耳甘草湯方甘草二兩以水三升煮取一升半去滓溫服七合日二服桔梗湯方桔梗一兩甘草二兩上二味以水二升煮取一升去滓分溫再服少陰病咽中痛半夏散及湯主之少陰咽痛甘不能緩者必以辛散之寒不能除者必以溫發之蓋少陰客邪郁聚咽嗌之間既不得出復不得入設以寒治則聚益甚投以辛溫則鬱反通內經微者逆之甚者從之之意也半夏散及湯甘辛合用而辛勝於甘其氣又溫不特能解客寒之氣亦能劫散咽喉怫鬱之熱也半夏散及湯方半夏洗桂枝去皮甘草炙各等分上三味各別搗篩已合治之白飲和服方寸匕日三服若不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令小冷少少咽之少陰下法三條少陰病得之二三日口燥咽乾者急下之宜大承氣湯此少陰熱並陽明之證二三日為病未久而便口燥咽乾熱氣盛而陰氣少矣蓋陽明土少陰水熱並陽明則土實而水虛不特熱氣傷陰即土氣亦傷水也故宜急下以瀉土而全水不然熱盛傷陰土實亦傷陰其乾槁可立而待然非心下痛腹脹不大便如下二條所云亦未可以大承氣輕試也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯此亦少陰熱並陽明而氣復下注之證然雖下注而邪實不去但水液從旁下轉為自利清水而已故心下痛而口乾燥也色純青者土受水邪玄黃合色而色轉純青也以大承氣急下則胃實去而腎病亦已矣少陰病六七日腹脹不大便者急下之宜大承氣湯腹脹不大便土實之徵也土實則水乾故非急下不可夫陽明居中土也萬物所歸故無論三陽三陰其邪皆得還入於胃而成可下之證然太陰傳陽明臟邪還腑為欲愈也厥陰傳陽明者木邪歸土不能復木也惟少陰則腎邪入胃而胃實復將消腎故雖並用下法而少陰之法視太陰厥陰為加峻矣少陰溫法十五條少陰病始得之反發熱脈沉者麻黃附子細辛湯主之此寒中少陰之經而復外連太陽之證以少陰與太陽為表裡其氣相通故也少陰始得本無熱而外連太陽則反發熱陽病脈當浮而仍緊少陰則脈不浮而沉故與附子細辛專溫少陰之經麻黃兼發太陽之表乃少陰經溫經散寒表裡兼治之法也麻黃附子細辛湯方麻黃二兩去節附子一枚炮去皮破八片細辛二兩上二味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升日三服按陽證有在經不在腑者陰病亦有在經不在臟者太陽篇云脈浮者桂枝湯少陰篇始得之反發熱脈沉者麻黃附子細辛湯及得之二三日麻黃附子甘草湯厥陰篇厥陰中風脈微浮為欲愈此皆陰病之在經而未入於臟者少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也少陰中寒二三日為脈沉惡寒無熱之時故可與麻黃附子甘草湯以取微汗而散寒邪無里證者無吐利心煩不得臥等證也以二三日病未入臟而寒亦未變熱故得用溫經散邪之法如麻黃附子細辛之例然去細辛之辛而加甘草之甘於法為較和矣所以然者寒邪不可不發而陰病又不可過發耳麻黃附子甘草湯方麻黃二兩去節附子一枚炮去皮甘草二兩炙上三味以水七升先煮麻黃一二沸去上沫納諸藥煮取三升去滓溫服一升日三服少陰病得之一二日口中和其背惡寒者當灸之附子湯主之口中和者不燥不渴為里無熱也背惡寒者背為陽而陰乘之不能通於外也陽不通故當灸之以通陽痹陽不足故主附子湯以補陽虛非如麻黃附子細辛之屬徒以溫散為事矣此陽虛受寒而虛甚於寒者之治法也按元和紀用經云少陰中寒而背惡寒者口中則和陽明受熱而背惡寒者則口燥而心煩一為陰寒下乘陽氣受傷一為陽熱入里津液不足是以背惡寒雖同而口中和與燥則異此辨證之要也附子湯方附子二枚炮去皮破八片茯苓芍藥各三兩人參二兩白朮四兩上五味以水八升煮取三升去滓溫服一升日三服氣虛者補之必以甘氣寒者溫之必以辛甘辛合用足以助正氣而散陰邪人參白朮茯苓附子是也而病屬陰經故又須芍藥以和陰氣且引附子入陰散寒所謂鄉導之兵也少陰病身體痛手足寒骨節痛脈沉者附子湯主之身體痛骨節痛寒在陰也手足寒脈沉病屬陰也若脈浮而手足熱則為太陽傷寒可與汗解者矣此為少陰血氣不足而寒邪侵之之證故亦宜附子湯復陽散陰益精氣也少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之少陰中寒二三日不已至四五日邪氣遞深而臟受其病矣臟寒故腹痛寒勝而陽不行故小便不利於是水寒相摶浸淫內外為四肢沉重疼痛為自下利皆水氣乘寒氣而動之故也其人或咳或小便利或下利或嘔者水寒之氣或聚或散或上真武湯方方見太陽斡旋法三服後加減法若咳者加五味子半升細辛乾薑各一兩咳者水寒射肺氣逆而不下也成氏曰五味子之酸以收逆氣細辛乾薑之辛以散水寒若小便利者去茯苓小便利者水已下趨不必更利其水故去茯苓若下利者去芍藥加乾薑二兩下利者寒盛於內也故去芍藥加乾薑避寒而就溫也若嘔者去附子加生薑足前成半斤嘔者氣逆於上也故去附子加生薑二物辛熱則同而生薑善降逆附子能行而不能下則不同也少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之此寒中少陰陰盛格陽之證下利清穀手足厥逆脈微欲絕者陰盛於內也身熱不惡寒面赤色者格陽於外也真陽之氣被陰寒所迫不安其處而遊散於外故顯諸熱象實非熱也通脈四逆即四逆加乾薑一倍為陰內陽外脈絕不通故增辛熱以逐寒邪寒去則陽復反而脈復出故曰其脈即出者愈通脈四逆湯方甘草二兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈加減法面色赤者加蔥九莖面色赤陽格於上也蔥中空味辛能通陽氣腹中痛者去蔥加芍藥二兩腹中痛陰滯於裡也芍藥味酸能利陰氣止腹痛故加之蔥通陽而不利陰故去之嘔者加生薑二兩嘔者陰氣上逆也生薑之辛可散陰而降逆咽痛者去芍藥加桔梗一兩咽痛者陽氣上結也桔梗之辛可開陽結去芍藥者惡其收也利止脈不出者去桔梗加人參二兩利止脈不出亡血也故不利桔硬之散而利人參之甘而能補也少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯腎者胃之關也關門受邪上逆於胃則飲食入口即吐或心中溫溫欲吐而復不能吐也夫下氣上逆而為吐者原有可下之例如本論之噦而腹滿視其前後知何部不利者而利之金匱之食已即吐者大黃甘草湯主之是也若始得之手足寒脈弦遲者胸中邪實而陽氣不布也則其病不在下而在上其治法不可下而可吐所謂因其高者而越之也若膈上有寒飲而致乾嘔者則復不可吐而可溫所謂病痰飲者當以溫藥和之也故實可下而胸中實則不可下飲可吐而寒飲則不可吐仲景立法明辨詳審如此少陰病脈沉者急溫之宜四逆湯此不詳何證而但憑脈以論治曰少陰病脈沉者急溫之宜四逆湯然苟無厥逆惡寒下利不渴等證未可急與溫法愚謂學者當從全書會通不可拘於一文一字之間者此又其一也少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之少陰病下利脈微澀陰傷於下也嘔而汗出陽虛於上也陰虛並傷法必上下並溫矣若更衣雖數而所下無多尤為陰亡之驗是但當溫其上而不可溫其下即溫上之法亦不可以藥傷其陰而但宜灸以引其陽也灸法未詳少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之此寒中少陰而復上攻陽明之證吐利厥冷煩躁欲死者陰邪盛極而陽氣不勝也故以吳茱萸溫里散寒為主而既吐且利中氣必傷故以人參大棗益虛安中為輔也然後條云少陰病吐利煩躁四逆者死此復以吳茱萸湯主之者彼為陰極而陽欲絕此為陰盛而陽來爭也病證則同而辨之於爭與絕之間蓋亦微矣或云先厥冷而後煩躁者陽欲復而來爭也先煩躁而四逆者陽不勝而欲絕也亦通郭曰云云四逆而煩躁者不問其餘證先宜服吳茱萸湯四逆而不煩躁者先宜服四逆湯四逆下利脈不出者先宜服通脈四逆湯此三者治少陰之大法也少陰病下利白通湯主之少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生少陰病下利脈微者寒邪直中陽氣暴虛既不能固其內復不能通於脈故宜姜附之辛而溫者破陰固里蔥白之辛而通者入脈引陽也若服湯已下利不止而反厥逆無脈乾嘔煩者非藥之不中病也陰寒太甚上為格拒王太僕所謂甚大寒熱必能與違性者爭雄異氣者相格也故即於白通湯中加人尿之鹹寒豬膽汁之苦寒反其佐以同其氣使不相格而適相成內經所謂寒熱溫涼反從其病是也脈暴出者無根之陽發露不遺故死脈微續者被抑之陽來復有漸故生白通湯方蔥白四莖乾薑一兩生附子一枚去皮破八片上三味以水三升煮取一升去滓分溫再服白通加豬膽汁湯方蔥白四莖乾薑一兩豬膽汁一合人尿五合生附子一枚去皮破八片以上三味以水三升煮取一升去滓納人尿豬膽汁和令相得分溫再服若無膽亦可用少陰病下利便膿血者桃花湯主之少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之少陰病下利便膿血者可刺少陰病下利便膿血者臟病在陰而寒復傷血也血傷故腹痛陰病故小便不利與陽經挾熱下利不同故以赤石脂理血固脫乾薑溫里散寒粳米安中益氣用刺法者以邪陷血中刺之以行血散邪耳刺法未詳桃花湯方赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合納赤石脂末方寸匕日三服若一服愈余勿服少陰生死法十二條少陰中風脈陽微陰浮者為欲愈少陰中風者少陰之經自中風邪不從陽經傳入者也脈陽微者邪氣微陰浮者邪氣淺而裡氣和故為欲愈亦陰病得陽脈則生也少陰病欲解時從子至寅上少陰水臟也少陰之病陰邪也水王於子而陽長於寅少陰病欲解從子至寅上者陰氣待子則王而陰邪得陽則解也少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自止寒傷少陰之經手足厥冷而脈緊至七八日邪氣自經入臟自下利而脈微其病為較深矣乃手足反溫脈緊反去者陽氣內充而陰邪不能自容也故為欲解雖煩下利必自止者邪氣轉從下出與太陰之穢腐當去而下利者同意設邪氣盡則煩與利亦必自止耳少陰病下利若利自止惡寒而蜷臥手足溫者可治少陰病惡寒而蜷時自煩欲去衣被者可治少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯寒中少陰或下利或惡寒而蜷臥或吐利交作而脈不至陰邪盛而陽氣衰之候也若利自止手足溫或自煩欲去衣被或反發熱則陽氣已復而陰邪將退故皆得不死而可治脈不至者吐利交作元氣暴虛脈乍不至也灸少陰以引陽氣脈必自至總之傳經之病以陰氣之存亡為生死直中之病以陽氣之消長為生死也少陰病惡寒身蜷而利手足逆冷者不治少陰病四逆惡寒而身蜷脈不至不煩而躁者死惡寒身蜷而利手足逆冷陰氣太盛陽氣不振與前利止手足溫等證正相反蓋手足溫時自煩發熱者陽道長陰道消也手足逆冷不煩而躁者陰氣長陽氣消也且四逆而脈不至與手足溫而脈不至者不同彼則陽氣乍厥引之即出此則陽氣已絕招之不返也而煩與躁又不同煩者熱而煩也躁者亂而不必熱也煩而躁者陽怒而與陰爭期在必勝則生不煩而躁者陽不能戰復不能安而欲散去則死也少陰病吐利煩躁四逆者死寒中少陰吐利交作陰邪已太盛矣然或自煩發熱或手足不逆冷則陽氣猶在陰邪雖盛猶或可治所謂吐利手足不逆冷反發熱者不死也若更煩躁四逆則陽氣有散亡之象陰邪無退舍之期雖欲不死烏可得耶少陰病下利止而頭眩時時自冒者死下利止非利自愈也臟陰盡也眩目黑而轉也冒昏冒也陰氣既盡孤陽無附而浮亂於上故頭眩時時自冒也而陰氣難以卒復孤陽且易上散雖有良藥亦無及矣是以少陰病陽複利止則生陰盡利止則死也少陰病六七日息高者死息高氣高而喘也少陰為真氣之源呼吸之根六七日病不愈而息高者邪氣不去體而真氣已離根也故死少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死脈微細沉但欲臥邪傳少陰之本證如本篇第一條所云也汗出不煩者氣外泄而邪不與俱泄也自欲吐繼後自利者邪上下行而氣不能驅而出之也至煩躁不得臥寐則陰陽盡虛邪氣獨盛正不勝邪躁擾不寧頃之離散而死矣所謂病勝臟者死是也少陰病禁四條少陰病脈細沉數病為在裡不可發汗少陰與太陽為表裡而少陰亦自有表裡經病為在表臟病為在裡也浮沉而身發熱為病在表脈細沉數身不發熱為病在裡病在表者可發汗如麻黃附子細辛湯之例是也病在裡而汗之是竭其陰而動其血也故曰不可發汗少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之少陰雖為陰臟而元陽寓焉故其病有亡陽亡陰之異脈微者為亡陽脈弱澀者為亡陰發汗則傷陽故脈微者不可發汗下則傷陰故陽已虛而尺脈弱澀者非特不可發汗亦復不可下之也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治少陰中寒但厥無汗邪方內淫而氣不外達非可得汗愈者而強發之則汗必不出而血反自動或口鼻或目隨其所攻之道而外出也蓋發汗之藥其氣上行而性多慓悍不得於氣則去而之血必盡其性而後止耳然既臟虛邪入以致下厥而復迫血妄動以致上竭上下交徵而血氣之存者無幾矣尚何以御邪而卻疾耶故曰難治少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也少陰之邪上逆而咳下注而利矣而又復譫語此非少陰本病乃被火氣劫奪津液所致火劫即溫針灼艾之屬少陰不當發汗而強以火劫之不特竭其腎陰亦並耗其胃液胃干則譫語腎燥則小便難也
